<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Zuhara Tuition Center</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --blue:#2563eb;
    --light:#f5f7fb;
    --border:#e4e8f1;
    --text:#111827;
    --muted:#6b7280;
    --card:#ffffff;

    --shadow:
    0 8px 25px rgba(0,0,0,0.06);
}

body{

    font-family:'Inter',sans-serif;

    background:var(--light);

    color:var(--text);
}

/* HEADER */

.header{

    position:sticky;

    top:0;

    z-index:999;

    background:white;

    border-bottom:
    1px solid var(--border);

    padding:16px 20px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    gap:15px;
}

.logo{

    display:flex;

    align-items:center;

    gap:12px;

    font-size:1.1rem;

    font-weight:800;
}

.logo-icon{

    width:48px;
    height:48px;

    border-radius:14px;

    background:var(--blue);

    color:white;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:1.1rem;
}

.logout-btn{

    text-decoration:none;

    background:#eff6ff;

    color:var(--blue);

    padding:12px 16px;

    border-radius:12px;

    font-weight:600;

    font-size:0.92rem;
}

/* MAIN */

.main{

    max-width:1300px;

    margin:auto;

    padding:24px 18px 40px;
}

.title{

    font-size:2rem;

    font-weight:800;

    margin-bottom:10px;
}

.subtitle{

    color:var(--muted);

    margin-bottom:25px;

    font-size:1rem;
}

/* SEARCH */

.search-box{

    position:relative;

    margin-bottom:20px;
}

.search-box input{

    width:100%;

    padding:18px 20px 18px 52px;

    border-radius:16px;

    border:1px solid var(--border);

    background:white;

    font-size:1rem;

    outline:none;
}

.search-box i{

    position:absolute;

    left:18px;

    top:50%;

    transform:translateY(-50%);

    color:var(--muted);
}

/* FILTERS */

.filters{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(180px,1fr));

    gap:15px;

    margin-bottom:30px;
}

.filter-card{

    background:white;

    border:1px solid var(--border);

    border-radius:18px;

    padding:18px;

    box-shadow:var(--shadow);
}

.filter-label{

    font-size:0.88rem;

    color:var(--muted);

    margin-bottom:10px;

    font-weight:600;
}

.filter-card select{

    width:100%;

    padding:14px;

    border-radius:12px;

    border:1px solid var(--border);

    font-size:1rem;

    outline:none;

    background:#fff;
}

/* VIDEOS */

.video-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));

    gap:22px;
}

.video-card{

    background:white;

    border-radius:22px;

    overflow:hidden;

    cursor:pointer;

    box-shadow:var(--shadow);

    transition:0.25s;
}

.video-card:hover{

    transform:translateY(-4px);
}

.thumbnail{

    position:relative;

    aspect-ratio:16/9;

    background:black;
}

.thumbnail img{

    width:100%;
    height:100%;

    object-fit:cover;
}

.play{

    position:absolute;

    inset:0;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:2rem;

    color:white;

    background:
    rgba(0,0,0,0.25);
}

.video-info{

    padding:18px;
}

.video-title{

    font-size:1rem;

    font-weight:700;

    line-height:1.5;

    margin-bottom:12px;
}

.tags{

    display:flex;

    gap:10px;

    flex-wrap:wrap;
}

.tag{

    background:#eff6ff;

    color:var(--blue);

    padding:8px 12px;

    border-radius:999px;

    font-size:0.82rem;

    font-weight:600;
}

/* PLAYER */

.player-page{

    display:none;
}

.back-btn{

    border:none;

    background:white;

    border-radius:14px;

    padding:14px 18px;

    cursor:pointer;

    margin-bottom:20px;

    font-size:1rem;

    font-weight:600;

    box-shadow:var(--shadow);
}

.player{

    width:100%;

    aspect-ratio:16/9;

    overflow:hidden;

    border-radius:24px;

    background:black;

    box-shadow:var(--shadow);
}

.player iframe{

    width:100%;
    height:100%;

    border:none;
}

.details{

    background:white;

    margin-top:20px;

    border-radius:22px;

    padding:24px;

    box-shadow:var(--shadow);
}

.details h2{

    font-size:1.5rem;

    margin-bottom:12px;
}

.meta{

    display:flex;

    gap:10px;

    flex-wrap:wrap;
}

/* MOBILE */

@media(max-width:600px){

    .header{

        flex-direction:column;

        align-items:flex-start;
    }

    .title{

        font-size:1.7rem;
    }

    .video-grid{

        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<div class="header">

    <div class="logo">

        <div class="logo-icon">
            <i class="fas fa-graduation-cap"></i>
        </div>

        Zuhara Tuition Center

    </div>

    <a href="logout.html"
    class="logout-btn">

        Logout

    </a>

</div>

<div class="main">

    <div id="homePage">

        <div class="title">
            Recorded Classes
        </div>

        <div class="subtitle">
            Select Class and Subject to easily find videos
        </div>

        <div class="search-box">

            <i class="fas fa-search"></i>

            <input
            type="text"
            id="searchInput"
            placeholder="Search video title...">

        </div>

        <div class="filters">

            <div class="filter-card">

                <div class="filter-label">
                    Select Class
                </div>

                <select id="classFilter"></select>

            </div>

            <div class="filter-card">

                <div class="filter-label">
                    Select Subject
                </div>

                <select id="subjectFilter"></select>

            </div>

        </div>

        <div class="video-grid"
        id="videoGrid"></div>

    </div>

    <div class="player-page"
    id="playerPage">

        <button class="back-btn"
        onclick="goBack()">

            ← Back to Videos

        </button>

        <div class="player">

            <iframe
            id="videoFrame"
            allowfullscreen>
            </iframe>

        </div>

        <div class="details">

            <h2 id="videoTitle"></h2>

            <div class="meta"
            id="videoMeta"></div>

        </div>

    </div>

</div>

<script>

let videos = [];

let currentClass = 'All';

let currentSubject = 'All';

async function loadVideos(){

    const response =
    await fetch('links.txt');

    const text =
    await response.text();

    const lines =
    text.split('\n');

    videos = [];

    lines.forEach(line=>{

        line = line.trim();

        if(!line || line.startsWith('#')){
            return;
        }

        const parts =
        line.split('|');

        videos.push({

            url:parts[0]?.trim(),

            title:parts[1]?.trim(),

            className:parts[2]?.trim(),

            subject:parts[3]?.trim()
        });
    });

    setupFilters();

    renderVideos();
}

function setupFilters(){

    const classFilter =
    document.getElementById('classFilter');

    const subjectFilter =
    document.getElementById('subjectFilter');

    const classes = [

        'All',

        ...new Set(
            videos.map(v=>v.className)
        )
    ];

    const subjects = [

        'All',

        ...new Set(
            videos.map(v=>v.subject)
        )
    ];

    classFilter.innerHTML =
    classes.map(c=>
    `<option value="${c}">${c}</option>`
    ).join('');

    subjectFilter.innerHTML =
    subjects.map(s=>
    `<option value="${s}">${s}</option>`
    ).join('');

    classFilter.onchange = ()=>{

        currentClass =
        classFilter.value;

        renderVideos();
    };

    subjectFilter.onchange = ()=>{

        currentSubject =
        subjectFilter.value;

        renderVideos();
    };
}

function renderVideos(){

    const grid =
    document.getElementById('videoGrid');

    const search =
    document
    .getElementById('searchInput')
    .value
    .toLowerCase();

    grid.innerHTML = '';

    const filtered =
    videos.filter(video=>{

        const matchClass =

        currentClass === 'All'
        ||
        video.className === currentClass;

        const matchSubject =

        currentSubject === 'All'
        ||
        video.subject === currentSubject;

        const matchSearch =

        video.title
        .toLowerCase()
        .includes(search);

        return (
            matchClass
            &&
            matchSubject
            &&
            matchSearch
        );
    });

    if(filtered.length === 0){

        grid.innerHTML = `

        <div style="
        background:white;
        padding:30px;
        border-radius:20px;
        text-align:center;
        width:100%;
        ">

        No videos found

        </div>
        `;

        return;
    }

    filtered.forEach(video=>{

        const id =
        video.url.split('/embed/')[1];

        const thumb =
        `https://i.ytimg.com/vi/${id}/hqdefault.jpg`;

        const card =
        document.createElement('div');

        card.className =
        'video-card';

        card.innerHTML = `

        <div class="thumbnail">

            <img src="${thumb}">

            <div class="play">
                <i class="fas fa-play-circle"></i>
            </div>

        </div>

        <div class="video-info">

            <div class="video-title">
                ${video.title}
            </div>

            <div class="tags">

                <div class="tag">
                    ${video.className}
                </div>

                <div class="tag">
                    ${video.subject}
                </div>

            </div>

        </div>
        `;

        card.onclick =
        ()=>playVideo(video);

        grid.appendChild(card);
    });
}

function playVideo(video){

    document
    .getElementById('homePage')
    .style.display = 'none';

    document
    .getElementById('playerPage')
    .style.display = 'block';

    document
    .getElementById('videoFrame')
    .src =
    video.url + '?autoplay=1';

    document
    .getElementById('videoTitle')
    .innerText =
    video.title;

    document
    .getElementById('videoMeta')
    .innerHTML = `

    <div class="tag">
        ${video.className}
    </div>

    <div class="tag">
        ${video.subject}
    </div>
    `;

    window.scrollTo({
        top:0,
        behavior:'smooth'
    });
}

function goBack(){

    document
    .getElementById('playerPage')
    .style.display = 'none';

    document
    .getElementById('homePage')
    .style.display = 'block';

    document
    .getElementById('videoFrame')
    .src = '';
}

document
.getElementById('searchInput')
.addEventListener(
'input',
renderVideos
);

loadVideos();

</script>

</body>
</html>
