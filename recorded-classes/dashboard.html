<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zuhara Tuition Center</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --blue:#2563eb;
    --light:#f5f7fb;
    --border:#e4e8f1;
    --text:#111827;
    --muted:#6b7280;
    --card:#ffffff;
    --shadow:0 8px 25px rgba(0,0,0,0.06);
}

body{
    font-family:'Inter',sans-serif;
    background:var(--light);
    color:var(--text);
}

.header{
    position:sticky;
    top:0;
    z-index:999;
    background:white;
    border-bottom:1px solid var(--border);
    padding:16px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:1.1rem;
    font-weight:800;
}

.logo-icon{
    width:48px;
    height:48px;
    border-radius:14px;
    background:var(--blue);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
}

.logout-btn{
    background:#eff6ff;
    color:var(--blue);
    padding:12px 16px;
    border-radius:12px;
    text-decoration:none;
    font-weight:600;
}

.main{
    max-width:1300px;
    margin:auto;
    padding:24px 18px;
}

.title{
    font-size:2rem;
    font-weight:800;
}

.subtitle{
    color:var(--muted);
    margin-bottom:20px;
}

.search-box{
    position:relative;
    margin-bottom:20px;
}

.search-box input{
    width:100%;
    padding:18px 20px 18px 52px;
    border-radius:16px;
    border:1px solid var(--border);
    font-size:1rem;
}

.search-box i{
    position:absolute;
    left:18px;
    top:50%;
    transform:translateY(-50%);
    color:var(--muted);
}

.filters{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    margin-bottom:30px;
}

.filter-card{
    background:white;
    border:1px solid var(--border);
    border-radius:18px;
    padding:18px;
    box-shadow:var(--shadow);
}

.filter-label{
    font-size:0.88rem;
    color:var(--muted);
    margin-bottom:10px;
}

.video-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:22px;
}

.video-card{
    background:white;
    border-radius:22px;
    overflow:hidden;
    cursor:pointer;
    box-shadow:var(--shadow);
}

.thumbnail{
    aspect-ratio:16/9;
    position:relative;
    background:black;
}

.thumbnail img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.play{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    background:rgba(0,0,0,0.25);
    font-size:2rem;
}

.video-info{
    padding:18px;
}

.video-title{
    font-weight:700;
    margin-bottom:10px;
}

.tags{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.tag{
    background:#eff6ff;
    color:var(--blue);
    padding:8px 12px;
    border-radius:999px;
    font-size:0.82rem;
}

.player-page{
    display:none;
}

.player{
    width:100%;
    aspect-ratio:16/9;
    background:black;
    border-radius:20px;
    overflow:hidden;
}

.player iframe{
    width:100%;
    height:100%;
    border:none;
}

.back-btn{
    margin-bottom:15px;
    padding:12px 16px;
    border:none;
    border-radius:12px;
    background:white;
    box-shadow:var(--shadow);
    cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
    <div class="logo">
        <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
        Zuhara Tuition Center
    </div>
    <a class="logout-btn" href="logout.html">Logout</a>
</div>

<div class="main">

    <div id="homePage">

        <div class="title">Recorded Classes</div>
        <div class="subtitle">Select Class and Subject</div>

        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search video title...">
        </div>

        <div class="filters">

            <div class="filter-card">
                <div class="filter-label">Class</div>
                <select id="classFilter"></select>
            </div>

            <div class="filter-card">
                <div class="filter-label">Subject</div>
                <select id="subjectFilter"></select>
            </div>

        </div>

        <div class="video-grid" id="videoGrid"></div>

    </div>

    <div class="player-page" id="playerPage">

        <button class="back-btn" onclick="goBack()">← Back</button>

        <div class="player">
            <iframe id="videoFrame"></iframe>
        </div>

    </div>

</div>

<script>

let videos = [];
let currentClass = 'All';
let currentSubject = 'All';

async function loadVideos(){

    const res = await fetch('links.txt');
    const text = await res.text();

    videos = text.split('\n')
    .map(line => line.trim())
    .filter(line => line && !line.startsWith('#'))
    .map(line => {
        const parts = line.split('|');
        return {
            url: parts[0]?.trim(),
            title: parts[1]?.trim(),
            className: parts[2]?.trim(),
            subject: parts[3]?.trim()
        };
    })
    .filter(v =>
        v.url && v.title && v.className && v.subject
    );

    setupFilters();
    renderVideos();
}

function setupFilters(){

    const classFilter = document.getElementById('classFilter');
    const subjectFilter = document.getElementById('subjectFilter');

    const classes = ['All', ...new Set(
        videos
        .map(v => v.className)
        .filter(v => v && isNaN(v))
    )];

    const subjects = ['All', ...new Set(
        videos
        .map(v => v.subject)
        .filter(v => v)
    )];

    classFilter.innerHTML = classes.map(c =>
        `<option value="${c}">${c}</option>`
    ).join('');

    subjectFilter.innerHTML = subjects.map(s =>
        `<option value="${s}">${s}</option>`
    ).join('');

    classFilter.onchange = () => {
        currentClass = classFilter.value;
        renderVideos();
    };

    subjectFilter.onchange = () => {
        currentSubject = subjectFilter.value;
        renderVideos();
    };
}

function renderVideos(){

    const grid = document.getElementById('videoGrid');
    const search = document.getElementById('searchInput').value.toLowerCase();

    const filtered = videos.filter(v => {
        return (
            (currentClass === 'All' || v.className === currentClass) &&
            (currentSubject === 'All' || v.subject === currentSubject) &&
            v.title.toLowerCase().includes(search)
        );
    });

    grid.innerHTML = '';

    if(filtered.length === 0){
        grid.innerHTML = "<p>No videos found</p>";
        return;
    }

    filtered.forEach(video => {

        const id = video.url.split('/embed/')[1];
        const thumb = `https://i.ytimg.com/vi/${id}/hqdefault.jpg`;

        const card = document.createElement('div');
        card.className = 'video-card';

        card.innerHTML = `
            <div class="thumbnail">
                <img src="${thumb}">
                <div class="play"><i class="fas fa-play"></i></div>
            </div>
            <div class="video-info">
                <div class="video-title">${video.title}</div>
                <div class="tags">
                    <div class="tag">${video.className}</div>
                    <div class="tag">${video.subject}</div>
                </div>
            </div>
        `;

        card.onclick = () => {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('playerPage').style.display = 'block';
            document.getElementById('videoFrame').src = video.url + "?autoplay=1";
        };

        grid.appendChild(card);
    });
}

function goBack(){
    document.getElementById('playerPage').style.display = 'none';
    document.getElementById('homePage').style.display = 'block';
    document.getElementById('videoFrame').src = '';
}

document.getElementById('searchInput').addEventListener('input', renderVideos);

loadVideos();

</script>

</body>
</html>
