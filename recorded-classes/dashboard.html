<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zuhara Tuition Center Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#f4f7fb;
    --card:#ffffff;
    --border:#e3ebf5;
    --text:#162033;
    --muted:#6c7a92;
    --blue:#3b82f6;
    --blue2:#2563eb;
    --shadow:0 10px 40px rgba(15,23,42,0.08);
}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
}

/* HEADER */

.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:82px;
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(16px);
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 24px;
    z-index:999;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:1.1rem;
    font-weight:800;
}

.logo-icon{
    width:50px;
    height:50px;
    border-radius:18px;
    background:linear-gradient(135deg,var(--blue),var(--blue2));
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:1.2rem;
}

.search-box{
    flex:1;
    max-width:500px;
    margin:0 24px;
    position:relative;
}

.search-box input{
    width:100%;
    padding:15px 20px;
    border-radius:16px;
    border:1px solid var(--border);
    outline:none;
    font-size:0.95rem;
}

.search-box i{
    position:absolute;
    right:18px;
    top:50%;
    transform:translateY(-50%);
    color:var(--muted);
}

.logout-btn{
    padding:14px 18px;
    border-radius:14px;
    background:white;
    border:1px solid var(--border);
    text-decoration:none;
    color:var(--text);
    font-weight:600;
    transition:0.25s;
}

.logout-btn:hover{
    background:var(--blue);
    color:white;
}

/* LAYOUT */

.layout{
    display:flex;
    margin-top:82px;
}

/* SIDEBAR */

.sidebar{
    width:260px;
    position:fixed;
    top:82px;
    left:0;
    height:calc(100vh - 82px);
    background:white;
    border-right:1px solid var(--border);
    padding:24px 16px;
    overflow-y:auto;
}

.sidebar-title{
    font-size:0.8rem;
    color:var(--muted);
    margin-bottom:18px;
    font-weight:700;
    text-transform:uppercase;
}

.subject-btn{
    width:100%;
    padding:14px 16px;
    border:none;
    border-radius:16px;
    background:transparent;
    cursor:pointer;
    text-align:left;
    margin-bottom:10px;
    font-weight:600;
    transition:0.25s;
}

.subject-btn:hover{
    background:#eef5ff;
}

.subject-btn.active{
    background:linear-gradient(135deg,var(--blue),var(--blue2));
    color:white;
}

/* CONTENT */

.content{
    margin-left:260px;
    width:calc(100% - 260px);
    padding:34px;
}

.section-title{
    font-size:2rem;
    font-weight:800;
    margin-bottom:28px;
}

/* GRID */

.video-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:28px;
}

/* CARD */

.video-card{
    background:white;
    border-radius:24px;
    overflow:hidden;
    border:1px solid var(--border);
    cursor:pointer;
    transition:0.25s;
    box-shadow:var(--shadow);
}

.video-card:hover{
    transform:translateY(-5px);
}

.thumbnail{
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    overflow:hidden;
    position:relative;
}

.thumbnail img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.play-btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:70px;
    height:70px;
    border-radius:50%;
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(10px);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:1.4rem;
}

.video-info{
    padding:20px;
}

.video-title{
    font-size:1rem;
    font-weight:700;
    line-height:1.5;
    margin-bottom:10px;
}

.video-category{
    color:var(--muted);
    font-size:0.88rem;
}

/* PLAYER */

.player-page{
    display:none;
}

.back-btn{
    padding:14px 18px;
    border:none;
    border-radius:14px;
    background:white;
    border:1px solid var(--border);
    cursor:pointer;
    margin-bottom:22px;
    font-weight:600;
}

.video-player{
    width:100%;
    aspect-ratio:16/9;
    overflow:hidden;
    border-radius:28px;
    background:black;
    position:relative;
}

.video-player iframe{
    width:100%;
    height:100%;
    border:none;
}

.video-watermark{
    position:absolute;
    bottom:18px;
    right:18px;
    padding:10px 14px;
    border-radius:12px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(10px);
    color:white;
    font-size:0.82rem;
}

.video-details{
    margin-top:24px;
    background:white;
    border-radius:24px;
    border:1px solid var(--border);
    padding:24px;
}

/* MOBILE */

@media(max-width:900px){

    .sidebar{
        width:90px;
    }

    .content{
        margin-left:90px;
        width:calc(100% - 90px);
    }

    .sidebar-title{
        display:none;
    }

    .subject-btn{
        text-align:center;
        font-size:0.7rem;
        padding:14px 6px;
    }
}

@media(max-width:720px){

    .header{
        flex-wrap:wrap;
        height:auto;
        padding:16px;
        gap:14px;
    }

    .layout{
        margin-top:140px;
    }

    .sidebar{
        top:140px;
    }

    .search-box{
        width:100%;
        max-width:none;
        margin:0;
    }

    .content{
        padding:20px;
    }

    .video-grid{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<div class="header">

    <div class="logo">

        <div class="logo-icon">
            <i class="fas fa-graduation-cap"></i>
        </div>

        Zuhara Tuition Center

    </div>

    <div class="search-box">

        <input
        type="text"
        id="searchInput"
        placeholder="Search classes...">

        <i class="fas fa-search"></i>

    </div>

    <a href="./index.html" class="logout-btn">

        <i class="fas fa-sign-out-alt"></i>
        Logout

    </a>

</div>

<div class="layout">

    <div class="sidebar">

        <div class="sidebar-title">
            Subjects
        </div>

        <div id="subjectList"></div>

    </div>

    <div class="content">

        <div id="homePage">

            <div class="section-title">
                Recorded Classes
            </div>

            <div class="video-grid" id="videoGrid"></div>

        </div>

        <div class="player-page" id="playerPage">

            <button class="back-btn" onclick="goBack()">

                <i class="fas fa-arrow-left"></i>
                Back

            </button>

            <div class="video-player">

                <iframe
                id="videoFrame"
                allow="autoplay; encrypted-media"
                referrerpolicy="strict-origin"
                sandbox="allow-scripts allow-same-origin allow-presentation"
                allowfullscreen="false">
                </iframe>

                <div class="video-watermark">
                    Zuhara Tuition Center
                </div>

            </div>

            <div class="video-details">

                <h2 id="videoTitle"></h2>

                <div id="videoMeta"></div>

            </div>

        </div>

    </div>

</div>

<script>

/*
===================================
GITHUB PAGES SIMPLE AUTH
===================================
*/

function checkAuthentication(){

    const auth = localStorage.getItem('zuhara_auth');

    if(auth !== 'authenticated'){

        window.location.href = './index.html';
    }
}

checkAuthentication();

/*
===================================
VIDEOS
===================================
*/

let videos = [];

let currentCategory = 'All';

/*
===================================
LOAD VIDEOS
===================================
*/

async function loadVideos(){

    try{

        const response =
        await fetch('./links.txt');

        const text =
        await response.text();

        const lines =
        text.split('\n');

        videos = [];

        lines.forEach(line=>{

            line = line.trim();

            if(
                !line
                ||
                line.startsWith('#')
            ){
                return;
            }

            const parts =
            line.split('|');

            let url =
            parts[0]?.trim() || '';

            const title =
            parts[1]?.trim() || 'Untitled';

            const category =
            parts[2]?.trim() || 'General';

            let thumbnail = '';

            /*
            CONVERT YOUTUBE LINKS
            */

            if(url.includes('watch?v=')){

                const id =
                new URL(url)
                .searchParams.get('v');

                thumbnail =
                `https://img.youtube.com/vi/${id}/hqdefault.jpg`;

                url =
                `https://www.youtube-nocookie.com/embed/${id}`;
            }

            if(url.includes('youtu.be/')){

                const id =
                url.split('youtu.be/')[1];

                thumbnail =
                `https://img.youtube.com/vi/${id}/hqdefault.jpg`;

                url =
                `https://www.youtube-nocookie.com/embed/${id}`;
            }

            videos.push({
                url,
                title,
                category,
                thumbnail
            });

        });

        renderSubjects();

        renderVideos();

    }
    catch(error){

        document
        .getElementById('videoGrid')
        .innerHTML =
        '<h2>Could not load videos</h2>';
    }
}

/*
===================================
SUBJECTS
===================================
*/

function renderSubjects(){

    const subjects = [

        'All',

        ...new Set(
            videos.map(v=>v.category)
        )
    ];

    const container =
    document.getElementById('subjectList');

    container.innerHTML = '';

    subjects.forEach(subject=>{

        const btn =
        document.createElement('button');

        btn.className =
        'subject-btn';

        if(subject === currentCategory){

            btn.classList.add('active');
        }

        btn.innerHTML = subject;

        btn.onclick = ()=>{

            currentCategory =
            subject;

            document
            .querySelectorAll('.subject-btn')
            .forEach(b=>
                b.classList.remove('active')
            );

            btn.classList.add('active');

            renderVideos();
        };

        container.appendChild(btn);
    });
}

/*
===================================
RENDER VIDEOS
===================================
*/

function renderVideos(){

    const grid =
    document.getElementById('videoGrid');

    const search =
    document.getElementById('searchInput')
    .value
    .toLowerCase();

    grid.innerHTML = '';

    const filtered =
    videos.filter(video=>{

        const matchCategory =

        currentCategory === 'All'
        ||
        video.category === currentCategory;

        const matchSearch =

        video.title
        .toLowerCase()
        .includes(search);

        return matchCategory
        &&
        matchSearch;
    });

    filtered.forEach(video=>{

        const card =
        document.createElement('div');

        card.className =
        'video-card';

        card.onclick =
        ()=>playVideo(video);

        card.innerHTML = `

            <div class="thumbnail">

                <img src="${video.thumbnail}">

                <div class="play-btn">
                    <i class="fas fa-play"></i>
                </div>

            </div>

            <div class="video-info">

                <div class="video-title">
                    ${video.title}
                </div>

                <div class="video-category">
                    ${video.category}
                </div>

            </div>
        `;

        grid.appendChild(card);
    });
}

/*
===================================
PLAY VIDEO
===================================
*/

function playVideo(video){

    document
    .getElementById('homePage')
    .style.display = 'none';

    document
    .getElementById('playerPage')
    .style.display = 'block';

    const secureUrl =

    video.url +

    '?autoplay=1' +

    '&modestbranding=1' +

    '&rel=0' +

    '&controls=1' +

    '&disablekb=1' +

    '&fs=0' +

    '&iv_load_policy=3' +

    '&playsinline=1' +

    '&cc_load_policy=0';

    document
    .getElementById('videoFrame')
    .src = secureUrl;

    document
    .getElementById('videoTitle')
    .innerText =
    video.title;

    document
    .getElementById('videoMeta')
    .innerText =
    video.category;

    window.scrollTo({
        top:0,
        behavior:'smooth'
    });
}

/*
===================================
BACK
===================================
*/

function goBack(){

    document
    .getElementById('playerPage')
    .style.display = 'none';

    document
    .getElementById('homePage')
    .style.display = 'block';

    document
    .getElementById('videoFrame')
    .src = '';
}

/*
===================================
SEARCH
===================================
*/

document
.getElementById('searchInput')
.addEventListener(
'input',
renderVideos
);

/*
===================================
REMOVE SHARE OPTIONS
===================================
*/

document.addEventListener(
'contextmenu',
e=>{
    e.preventDefault();
});

document.addEventListener(
'dragstart',
e=>{
    e.preventDefault();
});

document.addEventListener(
'keydown',
e=>{

    if(e.key === 'F12'){
        e.preventDefault();
    }

    if(
        e.ctrlKey
        &&
        e.shiftKey
        &&
        e.key.toLowerCase() === 'i'
    ){
        e.preventDefault();
    }

    if(
        e.ctrlKey
        &&
        e.key.toLowerCase() === 'u'
    ){
        e.preventDefault();
    }

    if(
        e.ctrlKey
        &&
        e.key.toLowerCase() === 's'
    ){
        e.preventDefault();
    }
});

/*
===================================
START
===================================
*/

loadVideos();

</script>

</body>
</html>
