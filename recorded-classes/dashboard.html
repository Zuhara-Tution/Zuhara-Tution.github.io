<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Zuhara Tuition Center</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg:#07111f;
    --glass:rgba(255,255,255,0.08);
    --border:rgba(255,255,255,0.08);

    --blue:#3ba4ff;
    --blue2:#1b6dff;

    --text:#ffffff;
    --muted:#8fa9c7;
}

body{

    font-family:'Inter',sans-serif;

    background:
    radial-gradient(circle at top left,#123d75 0%,transparent 35%),
    radial-gradient(circle at bottom right,#0f5bd7 0%,transparent 35%),
    linear-gradient(135deg,#06101d,#081423,#0a1628);

    color:white;

    min-height:100vh;

    overflow-x:hidden;
}

body::before{

    content:'';

    position:fixed;

    inset:0;

    background:
    radial-gradient(circle at 20% 20%,
    rgba(59,164,255,0.15),
    transparent 20%),

    radial-gradient(circle at 80% 70%,
    rgba(59,164,255,0.12),
    transparent 25%);

    z-index:-1;

    filter:blur(80px);
}

/* HEADER */

.header{

    position:fixed;

    top:0;
    left:0;

    width:100%;

    height:75px;

    padding:0 24px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    backdrop-filter:blur(20px);

    background:rgba(7,17,31,0.55);

    border-bottom:1px solid rgba(255,255,255,0.06);

    z-index:999;
}

.logo{

    display:flex;

    align-items:center;

    gap:14px;

    font-size:1.2rem;

    font-weight:700;
}

.logo-icon{

    width:46px;
    height:46px;

    border-radius:14px;

    background:linear-gradient(135deg,#3ba4ff,#1b6dff);

    display:flex;

    align-items:center;

    justify-content:center;

    box-shadow:
    0 0 20px rgba(59,164,255,0.5),
    0 0 40px rgba(59,164,255,0.2);
}

.search-box{

    flex:1;

    max-width:520px;

    margin:0 30px;

    position:relative;
}

.search-box input{

    width:100%;

    padding:14px 22px;

    border:none;

    outline:none;

    border-radius:18px;

    background:rgba(255,255,255,0.08);

    color:white;

    font-size:0.95rem;

    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,0.06);
}

.search-box input::placeholder{

    color:#8fa9c7;
}

.search-box i{

    position:absolute;

    right:18px;

    top:50%;

    transform:translateY(-50%);

    color:#8fa9c7;
}

.logout-btn{

    padding:12px 18px;

    border-radius:16px;

    text-decoration:none;

    color:white;

    background:rgba(255,255,255,0.08);

    border:1px solid rgba(255,255,255,0.05);

    transition:0.25s;
}

.logout-btn:hover{

    background:rgba(59,164,255,0.15);
}

/* LAYOUT */

.layout{

    display:flex;

    margin-top:75px;
}

/* SIDEBAR */

.sidebar{

    width:260px;

    min-height:calc(100vh - 75px);

    position:fixed;

    left:0;
    top:75px;

    padding:22px 16px;

    overflow-y:auto;

    backdrop-filter:blur(20px);

    background:rgba(255,255,255,0.04);

    border-right:1px solid rgba(255,255,255,0.06);
}

.sidebar-title{

    color:#8fa9c7;

    font-size:0.8rem;

    margin-bottom:18px;

    padding-left:10px;

    text-transform:uppercase;

    letter-spacing:1px;
}

.subject-btn{

    width:100%;

    padding:14px 16px;

    margin-bottom:10px;

    border:none;

    border-radius:18px;

    background:transparent;

    color:white;

    text-align:left;

    cursor:pointer;

    transition:0.25s;

    font-size:0.95rem;
}

.subject-btn:hover{

    background:rgba(255,255,255,0.07);
}

.subject-btn.active{

    background:linear-gradient(135deg,#3ba4ff,#1b6dff);

    box-shadow:
    0 0 25px rgba(59,164,255,0.35);
}

/* CONTENT */

.content{

    margin-left:260px;

    width:calc(100% - 260px);

    padding:30px;
}

.section-title{

    font-size:1.5rem;

    margin-bottom:25px;

    font-weight:700;
}

/* VIDEO GRID */

.video-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(320px,1fr));

    gap:26px;
}

/* VIDEO CARD */

.video-card{

    cursor:pointer;

    transition:0.25s;
}

.video-card:hover{

    transform:translateY(-5px);
}

.thumbnail{

    width:100%;

    aspect-ratio:16/9;

    border-radius:24px;

    overflow:hidden;

    position:relative;

    background:#111;

    border:1px solid rgba(255,255,255,0.05);

    box-shadow:
    0 10px 40px rgba(0,0,0,0.25);
}

.thumbnail img{

    width:100%;
    height:100%;

    object-fit:cover;

    display:block;

    transition:0.3s;
}

.video-card:hover .thumbnail img{

    transform:scale(1.05);
}

.thumbnail-overlay{

    position:absolute;

    inset:0;

    background:
    linear-gradient(
        to top,
        rgba(0,0,0,0.45),
        transparent
    );

    pointer-events:none;
}

.play-btn{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:72px;
    height:72px;

    border-radius:50%;

    display:flex;

    align-items:center;

    justify-content:center;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,0.08);

    transition:0.25s;
}

.play-btn i{

    font-size:1.5rem;
}

.video-info{

    padding:14px 8px;
}

.video-title{

    font-size:1rem;

    font-weight:600;

    line-height:1.5;

    margin-bottom:8px;
}

.video-category{

    font-size:0.85rem;

    color:#8fa9c7;
}

/* PLAYER */

.player-page{

    display:none;
}

.back-btn{

    margin-bottom:22px;

    border:none;

    padding:13px 18px;

    border-radius:18px;

    color:white;

    cursor:pointer;

    background:rgba(255,255,255,0.08);

    transition:0.25s;
}

.back-btn:hover{

    background:rgba(59,164,255,0.15);
}

.video-player{

    position:relative;

    width:100%;

    aspect-ratio:16/9;

    overflow:hidden;

    border-radius:28px;

    background:black;

    box-shadow:
    0 0 35px rgba(59,164,255,0.18);
}

.video-player iframe{

    width:100%;
    height:100%;

    border:none;
}

.video-watermark{

    position:absolute;

    bottom:20px;
    right:20px;

    z-index:20;

    background:rgba(0,0,0,0.45);

    color:white;

    padding:8px 14px;

    border-radius:14px;

    font-size:0.8rem;

    backdrop-filter:blur(10px);
}

.video-details{

    margin-top:24px;

    padding:24px;

    border-radius:24px;

    background:rgba(255,255,255,0.06);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.06);
}

.video-details h2{

    font-size:1.5rem;

    margin-bottom:10px;
}

.video-meta{

    color:#8fa9c7;
}

/* MOBILE */

@media(max-width:950px){

    .sidebar{

        width:85px;
    }

    .subject-btn{

        font-size:0.7rem;

        text-align:center;

        padding:14px 6px;
    }

    .sidebar-title{

        display:none;
    }

    .content{

        margin-left:85px;

        width:calc(100% - 85px);
    }
}

@media(max-width:720px){

    .header{

        flex-wrap:wrap;

        height:auto;

        padding:14px;

        gap:14px;
    }

    .layout{

        margin-top:130px;
    }

    .sidebar{

        top:130px;
    }

    .search-box{

        order:3;

        width:100%;

        max-width:none;

        margin:0;
    }

    .video-grid{

        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<div class="header">

    <div class="logo">

        <div class="logo-icon">
            <i class="fas fa-graduation-cap"></i>
        </div>

        Zuhara Tuition Center

    </div>

    <div class="search-box">

        <input
        type="text"
        id="searchInput"
        placeholder="Search classes...">

        <i class="fas fa-search"></i>

    </div>

    <a href="./index.html"
    class="logout-btn"
    onclick="logout()">

        <i class="fas fa-sign-out-alt"></i>
        Logout

    </a>

</div>

<div class="layout">

    <div class="sidebar">

        <div class="sidebar-title">
            Subjects
        </div>

        <div id="subjectList"></div>

    </div>

    <div class="content">

        <div id="homePage">

            <div class="section-title">
                Recorded Classes
            </div>

            <div class="video-grid"
            id="videoGrid"></div>

        </div>

        <div class="player-page"
        id="playerPage">

            <button class="back-btn"
            onclick="goBack()">

                <i class="fas fa-arrow-left"></i>
                Back to Classes

            </button>

            <div class="video-player">

                <iframe
                id="videoFrame"
                allow="autoplay; encrypted-media"
                allowfullscreen
                referrerpolicy="strict-origin-when-cross-origin">
                </iframe>

                <div class="video-watermark">
                    Zuhara Tuition Center
                </div>

            </div>

            <div class="video-details">

                <h2 id="videoTitle"></h2>

                <div class="video-meta"
                id="videoMeta"></div>

            </div>

        </div>

    </div>

</div>

<script>

/* AUTH */

function checkAuthentication(){

    const authCookie =
    document.cookie
    .split(';')
    .find(cookie=>
        cookie.trim()
        .startsWith('zuhara_auth=')
    );

    if(!authCookie){

        window.location.href =
        './index.html';

        return;
    }

    const value =
    authCookie.split('=')[1];

    if(value !== 'authenticated'){

        window.location.href =
        './index.html';
    }
}

checkAuthentication();

/* DATA */

let videos = [];

let currentCategory = 'All';

/* LOAD VIDEOS */

async function loadVideos(){

    try{

        const response =
        await fetch('./links.txt');

        if(!response.ok){

            throw new Error(
                'links.txt missing'
            );
        }

        const text =
        await response.text();

        const lines =
        text.split('\n');

        videos = [];

        lines.forEach(line=>{

            line = line.trim();

            if(
                !line
                ||
                line.startsWith('#')
            ){
                return;
            }

            const parts =
            line.split('|');

            let url =
            parts[0]?.trim() || '';

            const title =
            parts[1]?.trim() || 'Untitled';

            const category =
            parts[2]?.trim() || 'General';

            let thumbnail = '';

            if(url.includes('watch?v=')){

                const id =
                new URL(url)
                .searchParams.get('v');

                thumbnail =
                `https://img.youtube.com/vi/${id}/maxresdefault.jpg`;

                url =
                `https://www.youtube-nocookie.com/embed/${id}`;
            }

            if(url.includes('youtu.be/')){

                const id =
                url
                .split('youtu.be/')[1]
                .split('?')[0];

                thumbnail =
                `https://img.youtube.com/vi/${id}/maxresdefault.jpg`;

                url =
                `https://www.youtube-nocookie.com/embed/${id}`;
            }

            videos.push({
                url,
                title,
                category,
                thumbnail
            });

        });

        renderSubjects();

        renderVideos();

    }
    catch(error){

        document
        .getElementById('videoGrid')
        .innerHTML =
        '<h2>Could not load videos</h2>';
    }
}

/* SUBJECTS */

function renderSubjects(){

    const subjects = [

        'All',

        ...new Set(
            videos.map(v=>v.category)
        )
    ];

    const container =
    document
    .getElementById('subjectList');

    container.innerHTML = '';

    subjects.forEach(subject=>{

        const btn =
        document
        .createElement('button');

        btn.className =
        'subject-btn';

        if(subject === currentCategory){

            btn.classList.add('active');
        }

        btn.innerHTML = `
            <i class="fas fa-book"></i>
            ${subject}
        `;

        btn.onclick = ()=>{

            currentCategory =
            subject;

            document
            .querySelectorAll('.subject-btn')
            .forEach(b=>
                b.classList.remove('active')
            );

            btn.classList.add('active');

            renderVideos();
        };

        container.appendChild(btn);
    });
}

/* VIDEOS */

function renderVideos(){

    const grid =
    document
    .getElementById('videoGrid');

    const search =
    document
    .getElementById('searchInput')
    .value
    .toLowerCase();

    grid.innerHTML = '';

    const filtered =
    videos.filter(video=>{

        const matchCategory =

        currentCategory === 'All'
        ||
        video.category === currentCategory;

        const matchSearch =

        video.title
        .toLowerCase()
        .includes(search);

        return matchCategory
        && matchSearch;
    });

    filtered.forEach(video=>{

        const card =
        document
        .createElement('div');

        card.className =
        'video-card';

        card.onclick =
        ()=>playVideo(video);

        card.innerHTML = `

            <div class="thumbnail">

                <img
                src="${video.thumbnail}"
                alt="${video.title}"
                loading="lazy"
                draggable="false"
                onerror="
                this.onerror=null;
                this.src='https://img.youtube.com/vi/default/hqdefault.jpg';
                ">

                <div class="thumbnail-overlay"></div>

                <div class="play-btn">
                    <i class="fas fa-play"></i>
                </div>

            </div>

            <div class="video-info">

                <div class="video-title">
                    ${video.title}
                </div>

                <div class="video-category">
                    ${video.category}
                </div>

            </div>
        `;

        grid.appendChild(card);
    });
}

/* PLAY VIDEO */

function playVideo(video){

    document
    .getElementById('homePage')
    .style.display = 'none';

    document
    .getElementById('playerPage')
    .style.display = 'block';

    const secureUrl =

    video.url +

    '?autoplay=1' +

    '&modestbranding=1' +

    '&rel=0' +

    '&controls=1' +

    '&disablekb=1' +

    '&fs=0' +

    '&playsinline=1' +

    '&iv_load_policy=3' +

    '&cc_load_policy=0' +

    '&showinfo=0' +

    '&origin=' + location.origin;

    document
    .getElementById('videoFrame')
    .src = secureUrl;

    document
    .getElementById('videoTitle')
    .innerText =
    video.title;

    document
    .getElementById('videoMeta')
    .innerText =
    video.category;

    window.scrollTo({
        top:0,
        behavior:'smooth'
    });
}

/* BACK */

function goBack(){

    document
    .getElementById('playerPage')
    .style.display = 'none';

    document
    .getElementById('homePage')
    .style.display = 'block';

    document
    .getElementById('videoFrame')
    .src = '';
}

/* SEARCH */

document
.getElementById('searchInput')
.addEventListener(
'input',
renderVideos
);

/* LOGOUT */

function logout(){

    document.cookie =
    'zuhara_auth=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
}

/* PROTECTION */

document.addEventListener(
'contextmenu',
e=>e.preventDefault()
);

document.addEventListener(
'dragstart',
e=>e.preventDefault()
);

document.addEventListener(
'keydown',
e=>{

    if(e.key === 'F12'){

        e.preventDefault();
    }

    if(
        e.ctrlKey
        &&
        e.shiftKey
        &&
        e.key.toLowerCase() === 'i'
    ){

        e.preventDefault();
    }

    if(
        e.ctrlKey
        &&
        e.key.toLowerCase() === 'u'
    ){

        e.preventDefault();
    }
});

/* START */

loadVideos();

</script>

</body>
</html>
