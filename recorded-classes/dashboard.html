<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recorded Classes - Zuhara Tuition Center</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
        }

        .header {
            background: white;
            padding: 1rem 2rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .header h1 {
            color: #1e4a6b;
            font-size: 1.3rem;
        }

        .logout-btn {
            background: #2c7a6e;
            color: white;
            padding: 0.5rem 1rem;
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .folder-embed {
            width: 100%;
            height: 85vh;
            border: none;
            border-radius: 12px;
            background: white;
        }

        .info {
            background: #e8f0fe;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            text-align: center;
            color: #1e4a6b;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            .folder-embed {
                height: 70vh;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📹 Zuhara Recorded Classes</h1>
        <a href="index.html" class="logout-btn" onclick="sessionStorage.clear()">Logout</a>
    </div>

    <div class="container">
        <div class="info">
            📍 All videos from Google Drive folder - Click any video to watch
        </div>
        
        <!-- Google Drive Folder Embed -->
        <iframe class="folder-embed" src="https://drive.google.com/embeddedfolderview?id=1hT4ychRz_7IoWYSha5yVoAKBAWlo_Q7c#grid"></iframe>
    </div>

    <script>
        // Check if user is authenticated
        if (sessionStorage.getItem('classroomAccess') !== 'granted') {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
