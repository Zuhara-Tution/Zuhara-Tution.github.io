<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zuhara Tuition Center</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg:#07111f;
    --card:#0d1b2c;
    --glass:rgba(255,255,255,0.08);
    --border:rgba(255,255,255,0.08);

    --blue:#3ba4ff;
    --blue2:#1b6dff;

    --text:#ffffff;
    --muted:#8fa9c7;

}

body{

    font-family:'Inter',sans-serif;

    background:
    radial-gradient(circle at top left,#123d75 0%,transparent 35%),
    radial-gradient(circle at bottom right,#0f5bd7 0%,transparent 35%),
    linear-gradient(135deg,#06101d,#081423,#0a1628);

    color:var(--text);

    min-height:100vh;

    overflow-x:hidden;

}

/* GLOW BACKGROUND */

body::before{

    content:'';

    position:fixed;

    inset:0;

    background:
    radial-gradient(circle at 20% 20%,rgba(59,164,255,0.15),transparent 20%),
    radial-gradient(circle at 80% 70%,rgba(59,164,255,0.12),transparent 25%);

    z-index:-1;

    filter:blur(80px);

}

/* HEADER */

.header{

    position:fixed;

    top:0;
    left:0;

    width:100%;

    height:75px;

    padding:0 24px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    backdrop-filter:blur(20px);

    background:rgba(7,17,31,0.55);

    border-bottom:1px solid rgba(255,255,255,0.06);

    z-index:999;

}

.logo{

    display:flex;

    align-items:center;

    gap:14px;

    font-size:1.2rem;

    font-weight:700;

}

.logo-icon{

    width:46px;
    height:46px;

    border-radius:14px;

    background:linear-gradient(135deg,#3ba4ff,#1b6dff);

    display:flex;

    align-items:center;

    justify-content:center;

    box-shadow:
    0 0 20px rgba(59,164,255,0.5),
    0 0 40px rgba(59,164,255,0.2);

}

.logo-icon i{

    font-size:1.2rem;

}

.search-box{

    flex:1;

    max-width:520px;

    margin:0 30px;

    position:relative;

}

.search-box input{

    width:100%;

    padding:14px 22px;

    border:none;

    outline:none;

    border-radius:18px;

    background:rgba(255,255,255,0.08);

    color:white;

    font-size:0.95rem;

    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,0.06);

}

.search-box input:focus{

    border:1px solid rgba(59,164,255,0.5);

    box-shadow:0 0 20px rgba(59,164,255,0.3);

}

.search-box i{

    position:absolute;

    right:18px;

    top:50%;

    transform:translateY(-50%);

    color:#8fa9c7;

}

.logout-btn{

    padding:12px 18px;

    border-radius:16px;

    text-decoration:none;

    color:white;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,0.05);

    transition:0.25s;

}

.logout-btn:hover{

    background:rgba(59,164,255,0.15);

    box-shadow:0 0 20px rgba(59,164,255,0.25);

}

/* LAYOUT */

.layout{

    display:flex;

    margin-top:75px;

}

/* SIDEBAR */

.sidebar{

    width:260px;

    min-height:calc(100vh - 75px);

    position:fixed;

    left:0;
    top:75px;

    padding:22px 16px;

    overflow-y:auto;

    backdrop-filter:blur(20px);

    background:rgba(255,255,255,0.04);

    border-right:1px solid rgba(255,255,255,0.06);

}

.sidebar-title{

    color:#8fa9c7;

    font-size:0.8rem;

    margin-bottom:18px;

    padding-left:10px;

    text-transform:uppercase;

    letter-spacing:1px;

}

.subject-btn{

    width:100%;

    padding:14px 16px;

    margin-bottom:10px;

    border:none;

    border-radius:18px;

    background:transparent;

    color:white;

    text-align:left;

    cursor:pointer;

    transition:0.25s;

    font-size:0.95rem;

}

.subject-btn:hover{

    background:rgba(255,255,255,0.07);

}

.subject-btn.active{

    background:linear-gradient(135deg,#3ba4ff,#1b6dff);

    box-shadow:
    0 0 25px rgba(59,164,255,0.35);

}

/* CONTENT */

.content{

    margin-left:260px;

    width:calc(100% - 260px);

    padding:30px;

}

/* SECTION */

.section-title{

    font-size:1.5rem;

    margin-bottom:25px;

    font-weight:700;

}

/* VIDEO GRID */

.video-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(320px,1fr));

    gap:26px;

}

/* CARD */

.video-card{

    cursor:pointer;

    transition:0.25s;

}

.video-card:hover{

    transform:translateY(-5px);

}

.thumbnail{

    width:100%;

    aspect-ratio:16/9;

    border-radius:24px;

    overflow:hidden;

    position:relative;

    background:#111;

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.05);

    box-shadow:
    0 10px 40px rgba(0,0,0,0.25);

}

.thumbnail iframe{

    width:100%;
    height:100%;

    border:none;

    pointer-events:none;

}

.thumbnail::after{

    content:'';

    position:absolute;

    inset:0;

    background:linear-gradient(
    to top,
    rgba(0,0,0,0.4),
    transparent);

}

.play-btn{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:72px;
    height:72px;

    border-radius:50%;

    display:flex;

    align-items:center;

    justify-content:center;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,0.08);

    opacity:0;

    transition:0.25s;

}

.play-btn i{

    font-size:1.5rem;

}

.video-card:hover .play-btn{

    opacity:1;

}

.video-info{

    padding:14px 8px;

}

.video-title{

    font-size:1rem;

    font-weight:600;

    line-height:1.5;

    margin-bottom:8px;

}

.video-category{

    font-size:0.85rem;

    color:#8fa9c7;

}

/* PLAYER PAGE */

.player-page{

    display:none;

}

.back-btn{

    margin-bottom:22px;

    border:none;

    padding:13px 18px;

    border-radius:18px;

    color:white;

    cursor:pointer;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(12px);

    transition:0.25s;

}

.back-btn:hover{

    background:rgba(59,164,255,0.15);

}

.video-player{

    width:100%;

    aspect-ratio:16/9;

    overflow:hidden;

    border-radius:28px;

    background:black;

    box-shadow:
    0 0 35px rgba(59,164,255,0.18);

}

.video-player iframe{

    width:100%;
    height:100%;

    border:none;

}

.video-details{

    margin-top:24px;

    padding:24px;

    border-radius:24px;

    background:rgba(255,255,255,0.06);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.06);

}

.video-details h2{

    font-size:1.5rem;

    margin-bottom:10px;

}

.video-meta{

    color:#8fa9c7;

}

/* SCROLLBAR */

::-webkit-scrollbar{

    width:8px;

}

::-webkit-scrollbar-thumb{

    background:#2456a7;

    border-radius:20px;

}

/* MOBILE */

@media(max-width:950px){

    .sidebar{

        width:85px;

    }

    .subject-btn{

        font-size:0.7rem;

        text-align:center;

        padding:14px 6px;

    }

    .sidebar-title{

        display:none;

    }

    .content{

        margin-left:85px;

        width:calc(100% - 85px);

    }

}

@media(max-width:720px){

    .header{

        flex-wrap:wrap;

        height:auto;

        padding:14px;

        gap:14px;

    }

    .layout{

        margin-top:130px;

    }

    .sidebar{

        top:130px;

    }

    .search-box{

        order:3;

        width:100%;

        max-width:none;

        margin:0;

    }

    .video-grid{

        grid-template-columns:1fr;

    }

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

    <div class="logo">

        <div class="logo-icon">
            <i class="fas fa-graduation-cap"></i>
        </div>

        Zuhara Tuition Center

    </div>

    <div class="search-box">

        <input
        type="text"
        id="searchInput"
        placeholder="Search classes...">

        <i class="fas fa-search"></i>

    </div>

    <a href="logout.html"
    class="logout-btn">

        <i class="fas fa-sign-out-alt"></i>
        Logout

    </a>

</div>

<div class="layout">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="sidebar-title">
            Subjects
        </div>

        <div id="subjectList"></div>

    </div>

    <!-- CONTENT -->

    <div class="content">

        <!-- HOME -->

        <div id="homePage">

            <div class="section-title">
                Recorded Classes
            </div>

            <div class="video-grid"
            id="videoGrid"></div>

        </div>

        <!-- PLAYER -->

        <div class="player-page"
        id="playerPage">

            <button class="back-btn"
            onclick="goBack()">

                <i class="fas fa-arrow-left"></i>
                Back to Classes

            </button>

            <div class="video-player">

                <iframe
                id="videoFrame"
                allowfullscreen
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
                </iframe>

            </div>

            <div class="video-details">

                <h2 id="videoTitle"></h2>

                <div class="video-meta"
                id="videoMeta"></div>

            </div>

        </div>

    </div>

</div>

<script>

// AUTH

function checkAuthentication(){

    const cookies =
    document.cookie.split(';');

    for(let cookie of cookies){

        const [name,value] =
        cookie.trim().split('=');

        if(name === 'zuhara_auth'
        && value === 'authenticated'){
            return true;
        }

    }

    window.location.href =
    'index.html';

}

checkAuthentication();

// DATA

let videos = [];

let currentCategory = 'All';

// LOAD

async function loadVideos(){

    try{

        const response =
        await fetch('links.txt');

        const text =
        await response.text();

        const lines =
        text.split('\n');

        videos = [];

        lines.forEach(line=>{

            line = line.trim();

            if(!line ||
            line.startsWith('#')){
                return;
            }

            const parts =
            line.split('|');

            let url =
            parts[0]?.trim() || '';

            const title =
            parts[1]?.trim() || 'Untitled';

            const category =
            parts[2]?.trim() || 'General';

            // CONVERT URL

            if(url.includes('watch?v=')){

                const id =
                new URL(url)
                .searchParams.get('v');

                url =
                `https://www.youtube.com/embed/${id}`;

            }

            if(url.includes('youtu.be/')){

                const id =
                url.split('youtu.be/')[1];

                url =
                `https://www.youtube.com/embed/${id}`;

            }

            videos.push({
                url,
                title,
                category
            });

        });

        renderSubjects();

        renderVideos();

    }
    catch(error){

        document
        .getElementById('videoGrid')
        .innerHTML =
        '<h2>Could not load videos</h2>';

    }

}

// SUBJECTS

function renderSubjects(){

    const subjects = [

        'All',

        ...new Set(
            videos.map(v=>v.category)
        )

    ];

    const container =
    document
    .getElementById('subjectList');

    container.innerHTML = '';

    subjects.forEach(subject=>{

        const btn =
        document
        .createElement('button');

        btn.className =
        'subject-btn';

        if(subject === currentCategory){

            btn.classList.add('active');

        }

        btn.innerHTML = `
            <i class="fas fa-book"></i>
            ${subject}
        `;

        btn.onclick = ()=>{

            currentCategory =
            subject;

            document
            .querySelectorAll('.subject-btn')
            .forEach(b=>
                b.classList.remove('active')
            );

            btn.classList.add('active');

            renderVideos();

        };

        container.appendChild(btn);

    });

}

// VIDEOS

function renderVideos(){

    const grid =
    document
    .getElementById('videoGrid');

    const search =
    document
    .getElementById('searchInput')
    .value
    .toLowerCase();

    grid.innerHTML = '';

    const filtered =
    videos.filter(video=>{

        const matchCategory =

        currentCategory === 'All'

        ||

        video.category === currentCategory;

        const matchSearch =

        video.title
        .toLowerCase()
        .includes(search);

        return matchCategory
        && matchSearch;

    });

    filtered.forEach(video=>{

        const card =
        document
        .createElement('div');

        card.className =
        'video-card';

        card.onclick =
        ()=>playVideo(video);

        card.innerHTML = `

            <div class="thumbnail">

                <iframe
                src="${video.url}">
                </iframe>

                <div class="play-btn">
                    <i class="fas fa-play"></i>
                </div>

            </div>

            <div class="video-info">

                <div class="video-title">
                    ${video.title}
                </div>

                <div class="video-category">
                    ${video.category}
                </div>

            </div>

        `;

        grid.appendChild(card);

    });

}

// PLAY VIDEO

function playVideo(video){

    document
    .getElementById('homePage')
    .style.display = 'none';

    document
    .getElementById('playerPage')
    .style.display = 'block';

    document
    .getElementById('videoFrame')
    .src =
    video.url + '?autoplay=1';

    document
    .getElementById('videoTitle')
    .innerText =
    video.title;

    document
    .getElementById('videoMeta')
    .innerText =
    video.category;

    window.scrollTo({
        top:0,
        behavior:'smooth'
    });

}

// BACK

function goBack(){

    document
    .getElementById('playerPage')
    .style.display = 'none';

    document
    .getElementById('homePage')
    .style.display = 'block';

    document
    .getElementById('videoFrame')
    .src = '';

}

// SEARCH

document
.getElementById('searchInput')
.addEventListener(
'input',
renderVideos
);

// START

loadVideos();

</script>

</body>
</html>
