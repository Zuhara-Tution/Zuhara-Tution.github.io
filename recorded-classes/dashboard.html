<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>Zuhara Tuition Center</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet"/>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg:#f4f7fb;
    --card:#ffffff;
    --border:#e3ebf5;
    --text:#162033;
    --muted:#6c7a92;
    --blue:#3b82f6;
    --blue2:#2563eb;

    --shadow:
    0 10px 40px rgba(15,23,42,0.08);

    --shadow2:
    0 20px 50px rgba(59,130,246,0.10);
}

body{

    font-family:'Inter',sans-serif;

    background:
    radial-gradient(circle at top left,
    rgba(59,130,246,0.08),
    transparent 25%),

    radial-gradient(circle at bottom right,
    rgba(37,99,235,0.08),
    transparent 25%),

    var(--bg);

    color:var(--text);

    min-height:100vh;

    overflow-x:hidden;
}

/* HEADER */

.header{

    position:fixed;

    top:0;
    left:0;

    width:100%;

    height:82px;

    background:
    rgba(255,255,255,0.82);

    backdrop-filter:blur(18px);

    border-bottom:
    1px solid var(--border);

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:0 28px;

    z-index:999;
}

.logo{

    display:flex;

    align-items:center;

    gap:14px;

    font-weight:800;

    font-size:1.1rem;
}

.logo-icon{

    width:50px;
    height:50px;

    border-radius:18px;

    background:
    linear-gradient(135deg,
    var(--blue),
    var(--blue2));

    color:white;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:1.2rem;

    box-shadow:
    0 10px 30px rgba(59,130,246,0.25);
}

.search-box{

    flex:1;

    max-width:540px;

    margin:0 30px;

    position:relative;
}

.search-box input{

    width:100%;

    padding:16px 20px;

    border-radius:18px;

    border:1px solid var(--border);

    outline:none;

    background:white;

    color:var(--text);

    font-size:0.95rem;

    transition:0.25s;
}

.search-box input:focus{

    border-color:var(--blue);

    box-shadow:
    0 0 0 4px rgba(59,130,246,0.12);
}

.search-box i{

    position:absolute;

    right:18px;

    top:50%;

    transform:translateY(-50%);

    color:var(--muted);
}

.logout-btn{

    padding:14px 18px;

    border-radius:16px;

    text-decoration:none;

    color:var(--text);

    background:white;

    border:1px solid var(--border);

    transition:0.25s;

    font-weight:600;
}

.logout-btn:hover{

    background:var(--blue);

    color:white;
}

/* LAYOUT */

.layout{

    display:flex;

    margin-top:82px;
}

/* SIDEBAR */

.sidebar{

    width:260px;

    position:fixed;

    top:82px;
    left:0;

    height:calc(100vh - 82px);

    background:
    rgba(255,255,255,0.75);

    backdrop-filter:blur(18px);

    border-right:
    1px solid var(--border);

    padding:24px 16px;

    overflow-y:auto;
}

.sidebar-title{

    font-size:0.78rem;

    font-weight:700;

    color:var(--muted);

    text-transform:uppercase;

    letter-spacing:1px;

    margin-bottom:18px;

    padding-left:10px;
}

.subject-btn{

    width:100%;

    padding:15px 16px;

    border:none;

    border-radius:18px;

    background:transparent;

    color:var(--text);

    text-align:left;

    cursor:pointer;

    margin-bottom:10px;

    transition:0.25s;

    font-weight:600;

    display:flex;

    align-items:center;

    gap:12px;
}

.subject-btn:hover{

    background:#eef5ff;
}

.subject-btn.active{

    background:
    linear-gradient(135deg,
    var(--blue),
    var(--blue2));

    color:white;
}

/* CONTENT */

.content{

    margin-left:260px;

    width:calc(100% - 260px);

    padding:34px;
}

.section-title{

    font-size:2rem;

    font-weight:800;

    margin-bottom:30px;
}

/* GRID */

.video-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(320px,1fr));

    gap:28px;
}

/* CARD */

.video-card{

    background:white;

    border-radius:28px;

    overflow:hidden;

    cursor:pointer;

    border:1px solid var(--border);

    transition:0.3s;

    box-shadow:var(--shadow);
}

.video-card:hover{

    transform:translateY(-6px);

    box-shadow:var(--shadow2);
}

.thumbnail{

    width:100%;

    aspect-ratio:16/9;

    overflow:hidden;

    position:relative;

    background:black;
}

.thumbnail img{

    width:100%;
    height:100%;

    object-fit:cover;

    display:block;
}

.thumbnail::after{

    content:'';

    position:absolute;

    inset:0;

    background:
    linear-gradient(to top,
    rgba(0,0,0,0.35),
    transparent);
}

.play-btn{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:74px;
    height:74px;

    border-radius:50%;

    background:
    rgba(255,255,255,0.18);

    backdrop-filter:blur(12px);

    color:white;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:1.4rem;

    opacity:0;

    transition:0.25s;
}

.video-card:hover .play-btn{

    opacity:1;
}

.video-info{

    padding:20px;
}

.video-title{

    font-size:1rem;

    font-weight:700;

    line-height:1.5;

    margin-bottom:10px;
}

.video-category{

    font-size:0.88rem;

    color:var(--muted);
}

/* PLAYER */

.player-page{

    display:none;
}

.back-btn{

    padding:14px 18px;

    border:none;

    border-radius:16px;

    background:white;

    border:1px solid var(--border);

    cursor:pointer;

    margin-bottom:24px;

    font-weight:600;
}

.video-player{

    position:relative;

    width:100%;

    aspect-ratio:16/9;

    overflow:hidden;

    border-radius:32px;

    background:black;

    box-shadow:
    0 20px 60px rgba(15,23,42,0.12);
}

.video-player iframe{

    width:100%;
    height:100%;

    border:none;
}

.video-watermark{

    position:absolute;

    top:20px;
    right:20px;

    padding:10px 16px;

    border-radius:14px;

    background:
    rgba(0,0,0,0.45);

    backdrop-filter:blur(10px);

    color:white;

    font-size:0.82rem;

    z-index:20;

    pointer-events:none;
}

.video-details{

    margin-top:28px;

    background:white;

    border:1px solid var(--border);

    border-radius:28px;

    padding:28px;

    box-shadow:var(--shadow);
}

.video-details h2{

    font-size:1.6rem;

    margin-bottom:10px;
}

.video-meta{

    color:var(--muted);
}

/* MOBILE */

@media(max-width:950px){

    .sidebar{

        width:90px;
    }

    .sidebar-title{

        display:none;
    }

    .subject-btn{

        justify-content:center;

        padding:16px 6px;

        font-size:0.72rem;
    }

    .content{

        margin-left:90px;

        width:calc(100% - 90px);
    }
}

@media(max-width:720px){

    .header{

        flex-wrap:wrap;

        height:auto;

        padding:16px;

        gap:14px;
    }

    .layout{

        margin-top:140px;
    }

    .sidebar{

        top:140px;
    }

    .search-box{

        order:3;

        width:100%;

        max-width:none;

        margin:0;
    }

    .video-grid{

        grid-template-columns:1fr;
    }

    .content{

        padding:20px;
    }
}

</style>
</head>

<body>

<div class="header">

    <div class="logo">

        <div class="logo-icon">
            <i class="fas fa-graduation-cap"></i>
        </div>

        Zuhara Tuition Center

    </div>

    <div class="search-box">

        <input
        type="text"
        id="searchInput"
        placeholder="Search classes...">

        <i class="fas fa-search"></i>

    </div>

    <a href="logout.html"
    class="logout-btn">

        <i class="fas fa-sign-out-alt"></i>
        Logout

    </a>

</div>

<div class="layout">

    <div class="sidebar">

        <div class="sidebar-title">
            Subjects
        </div>

        <div id="subjectList"></div>

    </div>

    <div class="content">

        <div id="homePage">

            <div class="section-title">
                Recorded Classes
            </div>

            <div class="video-grid"
            id="videoGrid"></div>

        </div>

        <div class="player-page"
        id="playerPage">

            <button class="back-btn"
            onclick="goBack()">

                <i class="fas fa-arrow-left"></i>
                Back to Classes

            </button>

            <div class="video-player">

                <iframe
                id="videoFrame"
                allowfullscreen
                loading="lazy"
                referrerpolicy="strict-origin-when-cross-origin"
                allow="autoplay; encrypted-media"
                sandbox="allow-scripts allow-same-origin allow-presentation">
                </iframe>

                <div class="video-watermark">
                    Zuhara Tuition Center
                </div>

            </div>

            <div class="video-details">

                <h2 id="videoTitle"></h2>

                <div class="video-meta"
                id="videoMeta"></div>

            </div>

        </div>

    </div>

</div>

<script>

function checkAuthentication(){

    const cookies =
    document.cookie.split(';');

    for(let cookie of cookies){

        const [name,value] =
        cookie.trim().split('=');

        if(
            name === 'zuhara_auth'
            &&
            value === 'authenticated'
        ){
            return true;
        }
    }

    window.location.href =
    'index.html';
}

checkAuthentication();

let videos = [];

let currentCategory = 'All';

async function loadVideos(){

    try{

        const response =
        await fetch('links.txt');

        const text =
        await response.text();

        const lines =
        text.split('\n');

        videos = [];

        lines.forEach(line=>{

            line = line.trim();

            if(
                !line
                ||
                line.startsWith('#')
            ){
                return;
            }

            const parts =
            line.split('|');

            let url =
            parts[0]?.trim() || '';

            const title =
            parts[1]?.trim() || 'Untitled';

            const category =
            parts[2]?.trim() || 'General';

            if(url.includes('watch?v=')){

                const id =
                new URL(url)
                .searchParams.get('v');

                url =
                `https://www.youtube-nocookie.com/embed/${id}`;
            }

            if(url.includes('youtu.be/')){

                const id =
                url.split('youtu.be/')[1];

                url =
                `https://www.youtube-nocookie.com/embed/${id}`;
            }

            videos.push({
                url,
                title,
                category
            });

        });

        renderSubjects();

        renderVideos();

    }
    catch(error){

        document
        .getElementById('videoGrid')
        .innerHTML =
        '<h2>Could not load videos</h2>';
    }
}

function renderSubjects(){

    const subjects = [

        'All',

        ...new Set(
            videos.map(v=>v.category)
        )
    ];

    const container =
    document
    .getElementById('subjectList');

    container.innerHTML = '';

    subjects.forEach(subject=>{

        const btn =
        document
        .createElement('button');

        btn.className =
        'subject-btn';

        if(subject === currentCategory){

            btn.classList.add('active');
        }

        btn.innerHTML = `
            <i class="fas fa-book"></i>
            ${subject}
        `;

        btn.onclick = ()=>{

            currentCategory =
            subject;

            renderSubjects();

            renderVideos();
        };

        container.appendChild(btn);
    });
}

function renderVideos(){

    const grid =
    document
    .getElementById('videoGrid');

    const search =
    document
    .getElementById('searchInput')
    .value
    .toLowerCase();

    grid.innerHTML = '';

    const filtered =
    videos.filter(video=>{

        const matchCategory =

        currentCategory === 'All'
        ||
        video.category === currentCategory;

        const matchSearch =

        video.title
        .toLowerCase()
        .includes(search);

        return matchCategory
        &&
        matchSearch;
    });

    filtered.forEach(video=>{

        const card =
        document
        .createElement('div');

        card.className =
        'video-card';

        card.onclick =
        ()=>playVideo(video);

        const videoId =
        video.url.split('/embed/')[1];

        const thumbnail =
        `https://i.ytimg.com/vi/${videoId}/maxresdefault.jpg`;

        card.innerHTML = `

            <div class="thumbnail">

                <img
                src="${thumbnail}"
                alt="${video.title}">

                <div class="play-btn">
                    <i class="fas fa-play"></i>
                </div>

            </div>

            <div class="video-info">

                <div class="video-title">
                    ${video.title}
                </div>

                <div class="video-category">
                    ${video.category}
                </div>

            </div>
        `;

        grid.appendChild(card);
    });
}

function playVideo(video){

    document
    .getElementById('homePage')
    .style.display = 'none';

    document
    .getElementById('playerPage')
    .style.display = 'block';

    const secureUrl =

    video.url +

    '?autoplay=1' +

    '&rel=0' +

    '&modestbranding=1' +

    '&controls=1' +

    '&disablekb=1' +

    '&fs=0' +

    '&playsinline=1' +

    '&iv_load_policy=3' +

    '&cc_load_policy=0' +

    '&autohide=1';

    document
    .getElementById('videoFrame')
    .src =
    secureUrl;

    document
    .getElementById('videoTitle')
    .innerText =
    video.title;

    document
    .getElementById('videoMeta')
    .innerText =
    video.category;

    window.scrollTo({
        top:0,
        behavior:'smooth'
    });
}

function goBack(){

    document
    .getElementById('playerPage')
    .style.display = 'none';

    document
    .getElementById('homePage')
    .style.display = 'block';

    document
    .getElementById('videoFrame')
    .src = '';
}

document
.getElementById('searchInput')
.addEventListener(
'input',
renderVideos
);

document.addEventListener(
'contextmenu',
e=>{
    e.preventDefault();
});

document.addEventListener(
'keydown',
e=>{

    if(e.key === 'F12'){
        e.preventDefault();
    }

    if(
        e.ctrlKey
        &&
        e.key.toLowerCase() === 'u'
    ){
        e.preventDefault();
    }

    if(
        e.ctrlKey
        &&
        e.shiftKey
        &&
        e.key.toLowerCase() === 'i'
    ){
        e.preventDefault();
    }
});

loadVideos();

</script>

</body>
</html>
