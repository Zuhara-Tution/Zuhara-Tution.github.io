<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zuhara Tuition Center</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --blue:#2563eb;
    --light:#f5f7fb;
    --border:#e4e8f1;
    --text:#111827;
    --muted:#6b7280;
    --shadow:0 8px 25px rgba(0,0,0,0.06);
}

body{
    font-family:'Inter',sans-serif;
    background:var(--light);
    color:var(--text);
}

/* HEADER */
.header{
    position:sticky;
    top:0;
    z-index:999;
    background:white;
    border-bottom:1px solid var(--border);
    padding:16px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
    font-weight:800;
}

.logo-icon{
    width:48px;
    height:48px;
    background:var(--blue);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:14px;
}

.logout-btn{
    background:#eff6ff;
    color:var(--blue);
    padding:10px 14px;
    border-radius:10px;
    text-decoration:none;
    font-weight:600;
}

/* MAIN */
.main{
    max-width:1200px;
    margin:auto;
    padding:25px 18px;
}

.title{
    font-size:2rem;
    font-weight:800;
}

.subtitle{
    color:var(--muted);
    margin-bottom:20px;
}

/* SEARCH */
.search-box{
    position:relative;
    margin-bottom:20px;
}

.search-box input{
    width:100%;
    padding:16px 18px 16px 50px;
    border-radius:14px;
    border:1px solid var(--border);
    outline:none;
    font-size:1rem;
}

.search-box i{
    position:absolute;
    left:16px;
    top:50%;
    transform:translateY(-50%);
    color:var(--muted);
}

/* FILTERS */
.filters{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    margin-bottom:25px;
}

.filter-card{
    background:white;
    padding:16px;
    border-radius:14px;
    border:1px solid var(--border);
    box-shadow:var(--shadow);
}

.filter-label{
    font-size:0.85rem;
    color:var(--muted);
    margin-bottom:8px;
    font-weight:600;
}

select{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid var(--border);
    outline:none;
}

/* GRID */
.video-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:18px;
}

/* CARD */
.video-card{
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:var(--shadow);
    cursor:pointer;
    transition:0.2s;
}

.video-card:hover{
    transform:translateY(-3px);
}

.thumbnail{
    position:relative;
    aspect-ratio:16/9;
    background:black;
}

.thumbnail img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.play{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    background:rgba(0,0,0,0.3);
    font-size:2rem;
}

.video-info{
    padding:14px;
}

.video-title{
    font-weight:700;
    margin-bottom:10px;
}

.tags{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

.tag{
    background:#eff6ff;
    color:var(--blue);
    padding:6px 10px;
    border-radius:999px;
    font-size:0.8rem;
}

/* PLAYER */
.player-page{
    display:none;
}

.player{
    width:100%;
    aspect-ratio:16/9;
    border-radius:16px;
    overflow:hidden;
    background:black;
}

.player iframe{
    width:100%;
    height:100%;
    border:none;
}

.back-btn{
    margin-bottom:15px;
    padding:10px 14px;
    border:none;
    border-radius:10px;
    background:white;
    box-shadow:var(--shadow);
    cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">
        <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
        Zuhara Tuition Center
    </div>
    <a class="logout-btn" href="logout.html">Logout</a>
</div>

<div class="main">

<div id="homePage">

    <div class="title">Recorded Classes</div>
    <div class="subtitle">Advanced Filter System</div>

    <div class="search-box">
        <i class="fas fa-search"></i>
        <input id="searchInput" placeholder="Search video...">
    </div>

    <div class="filters">

        <div class="filter-card">
            <div class="filter-label">Class</div>
            <select id="classFilter"></select>
        </div>

        <div class="filter-card">
            <div class="filter-label">Subject</div>
            <select id="subjectFilter"></select>
        </div>

    </div>

    <div class="video-grid" id="videoGrid"></div>

</div>

<div class="player-page" id="playerPage">

    <button class="back-btn" onclick="goBack()">← Back</button>

    <div class="player">
        <iframe id="videoFrame"></iframe>
    </div>

</div>

</div>

<script>

let videos = [];
let currentClass = "All";
let currentSubject = "All";

/* ================= LOAD DATA ================= */
async function loadVideos(){

    const res = await fetch("links.txt");
    const text = await res.text();

    videos = text.split("\n")
    .map(line => line.trim())
    .filter(line => line && !line.startsWith("#"))
    .map(line => {

        const parts = line.split("|");

        return {
            url: parts[0]?.trim(),
            title: parts[1]?.trim(),
            className: parts[2]?.trim(),
            subject: parts[3]?.trim()
        };
    })
    .filter(v =>
        v.url &&
        v.title &&
        v.className &&
        v.subject
    );

    setupFilters();
    renderVideos();
}

/* ================= CLEAN FILTERS ================= */
function clean(value){
    return value?.toString().trim();
}

function isValid(value){
    return value &&
           value !== "" &&
           !/^\d+$/.test(value); // remove pure numbers
}

function setupFilters(){

    const classFilter = document.getElementById("classFilter");
    const subjectFilter = document.getElementById("subjectFilter");

    let classes = new Set();
    let subjects = new Set();

    videos.forEach(v => {

        const cls = clean(v.className);
        const sub = clean(v.subject);

        if(isValid(cls)) classes.add(cls);
        if(isValid(sub)) subjects.add(sub);
    });

    classes = ["All", ...Array.from(classes).sort()];
    subjects = ["All", ...Array.from(subjects).sort()];

    classFilter.innerHTML =
        classes.map(c => `<option value="${c}">${c}</option>`).join("");

    subjectFilter.innerHTML =
        subjects.map(s => `<option value="${s}">${s}</option>`).join("");

    classFilter.onchange = () => {
        currentClass = classFilter.value;
        renderVideos();
    };

    subjectFilter.onchange = () => {
        currentSubject = subjectFilter.value;
        renderVideos();
    };
}

/* ================= RENDER ================= */
function renderVideos(){

    const grid = document.getElementById("videoGrid");
    const search = document.getElementById("searchInput").value.toLowerCase();

    const filtered = videos.filter(v => {

        return (
            (currentClass === "All" || v.className === currentClass) &&
            (currentSubject === "All" || v.subject === currentSubject) &&
            v.title.toLowerCase().includes(search)
        );
    });

    grid.innerHTML = "";

    if(filtered.length === 0){
        grid.innerHTML = "<p>No videos found</p>";
        return;
    }

    filtered.forEach(video => {

        const id = video.url.split("/embed/")[1];
        const thumb = `https://i.ytimg.com/vi/${id}/hqdefault.jpg`;

        const card = document.createElement("div");
        card.className = "video-card";

        card.innerHTML = `
            <div class="thumbnail">
                <img src="${thumb}">
                <div class="play"><i class="fas fa-play"></i></div>
            </div>

            <div class="video-info">
                <div class="video-title">${video.title}</div>
                <div class="tags">
                    <div class="tag">${video.className}</div>
                    <div class="tag">${video.subject}</div>
                </div>
            </div>
        `;

        card.onclick = () => {
            document.getElementById("homePage").style.display = "none";
            document.getElementById("playerPage").style.display = "block";
            document.getElementById("videoFrame").src = video.url + "?autoplay=1";
        };

        grid.appendChild(card);
    });
}

/* ================= BACK ================= */
function goBack(){
    document.getElementById("playerPage").style.display = "none";
    document.getElementById("homePage").style.display = "block";
    document.getElementById("videoFrame").src = "";
}

/* ================= EVENTS ================= */
document.getElementById("searchInput").addEventListener("input", renderVideos);

loadVideos();

</script>

</body>
</html>
