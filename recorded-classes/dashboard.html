<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Recorded Classes - Zuhara Tuition Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e8edf2 100%);
            min-height: 100vh;
        }

        .header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.8);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.3rem;
            color: #1e4a6b;
        }

        .header h1 i {
            color: #2c7a6e;
            margin-right: 0.5rem;
        }

        .logout-btn {
            background: rgba(44, 122, 110, 0.1);
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            text-decoration: none;
            color: #2c7a6e;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(44, 122, 110, 0.2);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .video-embed-container {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(16px);
            border-radius: 1.5rem;
            padding: 1rem;
            margin-bottom: 2rem;
        }

        .video-embed-container h3 {
            color: #1e4a6b;
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        .video-embed-container iframe {
            width: 100%;
            height: 500px;
            border: none;
            border-radius: 1rem;
            background: #000;
        }

        .folder-embed-container {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(16px);
            border-radius: 1.5rem;
            padding: 1rem;
        }

        .folder-embed-container h3 {
            color: #1e4a6b;
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        .folder-embed-container iframe {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 1rem;
            background: white;
        }

        .info-box {
            background: #e8f0fe;
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 0.85rem;
            color: #1e4a6b;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            .header {
                padding: 0.8rem 1rem;
            }
            .video-embed-container iframe {
                height: 250px;
            }
            .folder-embed-container iframe {
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-chalkboard-teacher"></i> Zuhara Recorded Classes</h1>
        <a href="logout.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>

    <div class="container">
        <div class="info-box">
            <i class="fas fa-info-circle"></i> Click any video below to watch. All videos are from our Google Drive library.
        </div>

        <!-- Option 1: Direct Folder View - Shows all videos as thumbnails -->
        <div class="folder-embed-container">
            <h3><i class="fas fa-folder-open"></i> All Class Videos</h3>
            <iframe src="https://drive.google.com/embeddedfolderview?id=1hT4ychRz_7IoWYSha5yVoAKBAWlo_Q7c#grid" allowfullscreen></iframe>
        </div>

        <!-- Option 2: Individual Video Player (Optional - Uncomment to add specific videos) -->
        <!-- 
        <div class="video-embed-container">
            <h3><i class="fas fa-play-circle"></i> Featured: Real Numbers - Full Chapter</h3>
            <iframe src="https://drive.google.com/file/d/YOUR_FILE_ID/preview" allowfullscreen></iframe>
        </div>
        -->
    </div>

    <script>
        // Check authentication via cookie
        function checkAuthentication() {
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                const [name, value] = cookie.trim().split('=');
                if (name === 'zuhara_auth' && value === 'authenticated') {
                    return true;
                }
            }
            window.location.href = 'index.html';
            return false;
        }

        checkAuthentication();
    </script>
</body>
</html>
