<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zuhara Classes</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#0f0f0f;
    color:white;
}

/* HEADER */

.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:65px;
    background:#181818;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    z-index:1000;
    border-bottom:1px solid #222;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:1.2rem;
    font-weight:700;
}

.logo i{
    color:red;
    font-size:1.5rem;
}

.search-box{
    flex:1;
    max-width:500px;
    margin:0 20px;
    position:relative;
}

.search-box input{
    width:100%;
    padding:12px 20px;
    border-radius:30px;
    border:none;
    outline:none;
    background:#222;
    color:white;
    font-size:0.95rem;
}

.search-box i{
    position:absolute;
    right:18px;
    top:50%;
    transform:translateY(-50%);
    color:#888;
}

.logout-btn{
    background:#272727;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:30px;
    cursor:pointer;
    text-decoration:none;
    transition:0.2s;
}

.logout-btn:hover{
    background:#333;
}

/* LAYOUT */

.layout{
    display:flex;
    margin-top:65px;
}

/* SIDEBAR */

.sidebar{
    width:240px;
    background:#181818;
    min-height:calc(100vh - 65px);
    padding:20px 10px;
    border-right:1px solid #222;
    position:fixed;
    left:0;
    top:65px;
    overflow-y:auto;
}

.sidebar h3{
    color:#aaa;
    font-size:0.85rem;
    margin-bottom:15px;
    padding-left:10px;
    text-transform:uppercase;
}

.subject-btn{
    width:100%;
    text-align:left;
    background:none;
    border:none;
    color:white;
    padding:12px 14px;
    border-radius:12px;
    cursor:pointer;
    margin-bottom:6px;
    font-size:0.95rem;
    transition:0.2s;
}

.subject-btn:hover{
    background:#272727;
}

.subject-btn.active{
    background:white;
    color:black;
    font-weight:600;
}

/* CONTENT */

.content{
    margin-left:240px;
    width:calc(100% - 240px);
    padding:20px;
}

/* PLAYER PAGE */

.player-page{
    display:none;
}

.back-btn{
    background:#272727;
    border:none;
    color:white;
    padding:10px 18px;
    border-radius:30px;
    cursor:pointer;
    margin-bottom:20px;
    transition:0.2s;
}

.back-btn:hover{
    background:#333;
}

.video-player{
    width:100%;
    aspect-ratio:16/9;
    background:black;
    border-radius:18px;
    overflow:hidden;
}

.video-player iframe{
    width:100%;
    height:100%;
    border:none;
}

.video-details{
    margin-top:20px;
}

.video-details h2{
    font-size:1.4rem;
    margin-bottom:8px;
}

.video-meta{
    color:#aaa;
    font-size:0.9rem;
}

/* HOME */

.home-page{
    display:block;
}

.section-title{
    font-size:1.4rem;
    margin-bottom:20px;
}

.video-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:20px;
}

.video-card{
    cursor:pointer;
    transition:0.2s;
}

.video-card:hover{
    transform:translateY(-3px);
}

.thumbnail{
    width:100%;
    aspect-ratio:16/9;
    background:#222;
    border-radius:16px;
    overflow:hidden;
    position:relative;
}

.thumbnail iframe{
    width:100%;
    height:100%;
    border:none;
    pointer-events:none;
}

.play-icon{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:65px;
    height:65px;
    background:rgba(0,0,0,0.7);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.4rem;
    opacity:0;
    transition:0.2s;
}

.video-card:hover .play-icon{
    opacity:1;
}

.video-info{
    margin-top:12px;
}

.video-title{
    font-size:1rem;
    font-weight:600;
    margin-bottom:6px;
    line-height:1.4;
}

.video-category{
    color:#aaa;
    font-size:0.85rem;
}

/* MOBILE */

@media(max-width:900px){

    .sidebar{
        width:85px;
    }

    .sidebar h3{
        display:none;
    }

    .subject-btn{
        font-size:0.75rem;
        text-align:center;
        padding:12px 5px;
    }

    .content{
        margin-left:85px;
        width:calc(100% - 85px);
    }

}

@media(max-width:700px){

    .header{
        flex-wrap:wrap;
        height:auto;
        padding:10px;
        gap:10px;
    }

    .layout{
        margin-top:120px;
    }

    .sidebar{
        top:120px;
        width:70px;
    }

    .content{
        margin-left:70px;
        width:calc(100% - 70px);
        padding:15px;
    }

    .search-box{
        order:3;
        width:100%;
        max-width:none;
        margin:0;
    }

    .video-grid{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

    <div class="logo">
        <i class="fab fa-youtube"></i>
        Zuhara Classes
    </div>

    <div class="search-box">
        <input type="text" id="searchInput"
        placeholder="Search videos...">
        <i class="fas fa-search"></i>
    </div>

    <a href="logout.html" class="logout-btn">
        Logout
    </a>

</div>

<div class="layout">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <h3>Subjects</h3>

        <div id="subjectList"></div>

    </div>

    <!-- CONTENT -->

    <div class="content">

        <!-- HOME -->

        <div class="home-page" id="homePage">

            <h2 class="section-title">
                Recommended Classes
            </h2>

            <div class="video-grid"
            id="videoGrid"></div>

        </div>

        <!-- PLAYER -->

        <div class="player-page"
        id="playerPage">

            <button class="back-btn"
            onclick="goBack()">

                <i class="fas fa-arrow-left"></i>
                Back

            </button>

            <div class="video-player">

                <iframe
                id="videoFrame"
                allowfullscreen
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
                </iframe>

            </div>

            <div class="video-details">

                <h2 id="videoTitle"></h2>

                <div class="video-meta"
                id="videoMeta"></div>

            </div>

        </div>

    </div>

</div>

<script>

// AUTH CHECK

function checkAuthentication(){

    const cookies = document.cookie.split(';');

    for(let cookie of cookies){

        const [name,value] =
        cookie.trim().split('=');

        if(name === 'zuhara_auth'
        && value === 'authenticated'){
            return true;
        }

    }

    window.location.href = 'index.html';

}

checkAuthentication();

// DATA

let videos = [];
let currentCategory = 'All';

// LOAD VIDEOS

async function loadVideos(){

    try{

        const response =
        await fetch('links.txt');

        const text =
        await response.text();

        const lines =
        text.split('\n');

        videos = [];

        lines.forEach(line=>{

            line = line.trim();

            if(!line || line.startsWith('#')){
                return;
            }

            const parts = line.split('|');

            let url =
            parts[0]?.trim() || '';

            const title =
            parts[1]?.trim() || 'Untitled';

            const category =
            parts[2]?.trim() || 'General';

            // Convert URLs

            if(url.includes('watch?v=')){

                const id =
                new URL(url)
                .searchParams.get('v');

                url =
                `https://www.youtube.com/embed/${id}`;

            }

            if(url.includes('youtu.be/')){

                const id =
                url.split('youtu.be/')[1];

                url =
                `https://www.youtube.com/embed/${id}`;

            }

            videos.push({
                url,
                title,
                category
            });

        });

        renderSubjects();
        renderVideos();

    }
    catch(error){

        document.getElementById('videoGrid')
        .innerHTML =
        '<h3>Could not load videos</h3>';

    }

}

// RENDER SUBJECTS

function renderSubjects(){

    const subjects =
    ['All', ...new Set(
        videos.map(v=>v.category)
    )];

    const container =
    document.getElementById('subjectList');

    container.innerHTML = '';

    subjects.forEach(subject=>{

        const btn =
        document.createElement('button');

        btn.className =
        'subject-btn';

        if(subject === currentCategory){
            btn.classList.add('active');
        }

        btn.innerHTML =
        `<i class="fas fa-book"></i>
        ${subject}`;

        btn.onclick = ()=>{

            currentCategory = subject;

            document
            .querySelectorAll('.subject-btn')
            .forEach(b=>
                b.classList.remove('active')
            );

            btn.classList.add('active');

            renderVideos();

        };

        container.appendChild(btn);

    });

}

// RENDER VIDEOS

function renderVideos(){

    const grid =
    document.getElementById('videoGrid');

    const search =
    document.getElementById('searchInput')
    .value.toLowerCase();

    grid.innerHTML = '';

    let filtered =
    videos.filter(video=>{

        const matchCategory =
        currentCategory === 'All'
        || video.category === currentCategory;

        const matchSearch =
        video.title.toLowerCase()
        .includes(search);

        return matchCategory
        && matchSearch;

    });

    filtered.forEach(video=>{

        const card =
        document.createElement('div');

        card.className =
        'video-card';

        card.onclick =
        ()=>playVideo(video);

        card.innerHTML = `

            <div class="thumbnail">

                <iframe
                src="${video.url}">
                </iframe>

                <div class="play-icon">
                    <i class="fas fa-play"></i>
                </div>

            </div>

            <div class="video-info">

                <div class="video-title">
                    ${video.title}
                </div>

                <div class="video-category">
                    ${video.category}
                </div>

            </div>

        `;

        grid.appendChild(card);

    });

}

// PLAY VIDEO

function playVideo(video){

    document.getElementById('homePage')
    .style.display = 'none';

    document.getElementById('playerPage')
    .style.display = 'block';

    document.getElementById('videoFrame')
    .src = video.url + '?autoplay=1';

    document.getElementById('videoTitle')
    .innerText = video.title;

    document.getElementById('videoMeta')
    .innerText = video.category;

    window.scrollTo({
        top:0,
        behavior:'smooth'
    });

}

// BACK

function goBack(){

    document.getElementById('playerPage')
    .style.display = 'none';

    document.getElementById('homePage')
    .style.display = 'block';

    document.getElementById('videoFrame')
    .src = '';

}

// SEARCH

document
.getElementById('searchInput')
.addEventListener('input',
renderVideos);

// START

loadVideos();

</script>

</body>
</html>
