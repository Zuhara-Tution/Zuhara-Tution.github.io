<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Zuhara Tuition Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo h1 {
            color: white;
            font-size: 1.5rem;
        }

        .logo p {
            color: #8899aa;
            font-size: 0.85rem;
        }

        .logout-btn {
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #dc3545;
            color: white;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1.5rem;
            text-align: center;
            color: white;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #4ecdc4;
        }

        .stat-label {
            color: #8899aa;
            margin-top: 0.5rem;
        }

        .form-section {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .form-title {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            color: #c0d0e0;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .input-group input,
        .input-group select {
            padding: 0.8rem 1rem;
            border-radius: 0.8rem;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #4ecdc4;
        }

        .input-group input::placeholder {
            color: #556677;
        }

        .preview {
            background: rgba(0,0,0,0.3);
            border-radius: 0.8rem;
            padding: 1rem;
            margin-top: 1rem;
        }

        .preview iframe {
            border-radius: 0.5rem;
        }

        .btn {
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4ecdc4, #2c7a6e);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(78,205,196,0.3);
        }

        .table-section {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 2rem;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .search-box input {
            padding: 0.7rem 1rem;
            border-radius: 2rem;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            width: 250px;
        }

        .video-table {
            width: 100%;
            border-collapse: collapse;
            color: #e0e0e0;
        }

        .video-table th,
        .video-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .video-table th {
            color: #4ecdc4;
            font-weight: 600;
        }

        .video-table tr:hover {
            background: rgba(255,255,255,0.05);
        }

        .delete-btn {
            background: rgba(220, 53, 69, 0.2);
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            color: #dc3545;
            cursor: pointer;
            transition: 0.3s;
        }

        .delete-btn:hover {
            background: #dc3545;
            color: white;
        }

        .message {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .message.success {
            background: #28a745;
        }

        .message.error {
            background: #dc3545;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .loading {
            text-align: center;
            color: white;
            padding: 2rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .video-table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1><i class="fas fa-crown"></i> Admin Panel</h1>
                <p>Zuhara Tuition Center - Video Management</p>
            </div>
            <a href="logout.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalVideos">0</div>
                <div class="stat-label">Total Videos</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalClasses">0</div>
                <div class="stat-label">Classes</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalSubjects">0</div>
                <div class="stat-label">Subjects</div>
            </div>
        </div>

        <div class="form-section">
            <div class="form-title">
                <i class="fas fa-plus-circle"></i>
                Add New Video
            </div>
            <div class="form-grid">
                <div class="input-group">
                    <label><i class="fab fa-youtube"></i> YouTube URL or Video ID</label>
                    <input type="text" id="videoInput" placeholder="https://youtu.be/... or video_id">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-heading"></i> Video Title</label>
                    <input type="text" id="videoTitle" placeholder="e.g., SSLC Biology - Hormones">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-graduation-cap"></i> Class</label>
                    <select id="videoClass">
                        <option value="">Select Class</option>
                        <option value="5">Class 5</option>
                        <option value="6">Class 6</option>
                        <option value="7">Class 7</option>
                        <option value="8">Class 8</option>
                        <option value="9">Class 9</option>
                        <option value="10">Class 10</option>
                        <option value="11">Class 11</option>
                        <option value="12">Class 12</option>
                    </select>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-book"></i> Subject</label>
                    <input type="text" id="videoSubject" placeholder="e.g., Biology, Physics, Maths">
                </div>
            </div>
            <div class="preview" id="preview" style="display: none;">
                <label>Preview:</label>
                <iframe id="previewFrame" width="100%" height="200" frameborder="0" allowfullscreen></iframe>
            </div>
            <button class="btn btn-primary" onclick="addVideo()" style="margin-top: 1rem;">
                <i class="fas fa-save"></i> Add Video
            </button>
        </div>

        <div class="table-section">
            <div class="table-header">
                <div class="form-title" style="margin-bottom: 0;">
                    <i class="fas fa-video"></i>
                    Video Library
                </div>
                <div class="search-box">
                    <input type="text" id="searchTable" placeholder="Search videos..." onkeyup="filterTable()">
                </div>
            </div>
            <div id="tableContainer">
                <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading videos...</div>
            </div>
        </div>
    </div>

    <script>
        // ============ ADMIN AUTHENTICATION - NO COOKIES ============
        function checkAdminAuth() {
            // ONLY check sessionStorage - NO cookies for admin
            if (sessionStorage.getItem('adminAuthenticated') !== 'true') {
                // Redirect to student login page
                window.location.href = 'student-login.html';
                return false;
            }
            return true;
        }
        
        // Call immediately - if not authenticated, redirects
        checkAdminAuth();
        
        // ============ VIDEO MANAGEMENT CODE ============
        
        let videos = [];
        
        function extractVideoId(url) {
            if (!url) return null;
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/)([a-zA-Z0-9_-]{11})(?:[&?\/]|$)/,
                /^([a-zA-Z0-9_-]{11})$/
            ];
            for (let pattern of patterns) {
                const match = url.match(pattern);
                if (match && match[1]) return match[1];
            }
            return null;
        }
        
        function toEmbedUrl(videoId) {
            return `https://www.youtube-nocookie.com/embed/${videoId}`;
        }
        
        function loadVideos() {
            const stored = localStorage.getItem('zuhara_videos');
            if (stored) {
                videos = JSON.parse(stored);
            } else {
                videos = [
                    { id: "romcagwqpYI", title: "SSLC Biology - Hormones", class: "10", subject: "Biology" },
                    { id: "ByYlm3JRoe4", title: "SSLC Biology Revision", class: "10", subject: "Biology" },
                    { id: "Sh-CsHUdheA", title: "Plus One Physics Important Derivations", class: "11", subject: "Physics" },
                    { id: "Dt1ueakhi7g", title: "CBSE Class 12 Chemistry Live", class: "12", subject: "Chemistry" },
                    { id: "mm58oyjQM28", title: "Plus Two Organic Chemistry Revision", class: "12", subject: "Chemistry" }
                ];
                saveToLocalStorage();
            }
            updateStats();
            renderTable();
        }
        
        function saveToLocalStorage() {
            localStorage.setItem('zuhara_videos', JSON.stringify(videos));
            generateLinksTxt();
        }
        
        function generateLinksTxt() {
            let content = '# Zuhara Tuition Center - Video Library\n';
            content += '# Format: URL | Title | Class | Subject\n\n';
            for (let video of videos) {
                content += `${toEmbedUrl(video.id)} | ${video.title} | ${video.class} | ${video.subject}\n`;
            }
            return content;
        }
        
        function downloadLinksTxt() {
            const content = generateLinksTxt();
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'links.txt';
            a.click();
            URL.revokeObjectURL(url);
            showMessage("links.txt downloaded!", "success");
        }
        
        function addVideo() {
            const urlInput = document.getElementById('videoInput').value.trim();
            const title = document.getElementById('videoTitle').value.trim();
            const className = document.getElementById('videoClass').value;
            const subject = document.getElementById('videoSubject').value.trim();
            
            if (!urlInput) {
                showMessage("Please enter YouTube URL or Video ID", "error");
                return;
            }
            
            const videoId = extractVideoId(urlInput);
            if (!videoId) {
                showMessage("Invalid YouTube URL", "error");
                return;
            }
            
            if (!title) {
                showMessage("Please enter video title", "error");
                return;
            }
            
            if (!className) {
                showMessage("Please select class", "error");
                return;
            }
            
            if (!subject) {
                showMessage("Please enter subject", "error");
                return;
            }
            
            if (videos.some(v => v.id === videoId)) {
                showMessage("This video already exists!", "error");
                return;
            }
            
            videos.push({ id: videoId, title: title, class: className, subject: subject });
            saveToLocalStorage();
            
            document.getElementById('videoInput').value = '';
            document.getElementById('videoTitle').value = '';
            document.getElementById('videoClass').value = '';
            document.getElementById('videoSubject').value = '';
            document.getElementById('preview').style.display = 'none';
            
            updateStats();
            renderTable();
            showMessage("Video added successfully!", "success");
        }
        
        function deleteVideo(index) {
            if (confirm('Delete this video?')) {
                videos.splice(index, 1);
                saveToLocalStorage();
                updateStats();
                renderTable();
                showMessage("Video deleted!", "success");
            }
        }
        
        function updateStats() {
            document.getElementById('totalVideos').textContent = videos.length;
            const uniqueClasses = new Set(videos.map(v => v.class));
            document.getElementById('totalClasses').textContent = uniqueClasses.size;
            const uniqueSubjects = new Set(videos.map(v => v.subject.toLowerCase()));
            document.getElementById('totalSubjects').textContent = uniqueSubjects.size;
        }
        
        function renderTable() {
            const container = document.getElementById('tableContainer');
            const searchTerm = document.getElementById('searchTable')?.value.toLowerCase() || '';
            const filtered = videos.filter(v => 
                v.title.toLowerCase().includes(searchTerm) ||
                v.class.includes(searchTerm) ||
                v.subject.toLowerCase().includes(searchTerm)
            );
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="loading">No videos found</div>';
                return;
            }
            
            let html = `<table class="video-table"><thead><tr><th>#</th><th>Thumbnail</th><th>Title</th><th>Class</th><th>Subject</th><th>Actions</th></tr></thead><tbody>`;
            
            filtered.forEach((video, idx) => {
                html += `<tr>
                    <td>${idx + 1}</td>
                    <td><img src="https://i.ytimg.com/vi/${video.id}/hqdefault.jpg" width="80" height="45" style="border-radius: 5px;"></td>
                    <td><strong>${escapeHtml(video.title)}</strong></td>
                    <td>Class ${video.class}</td>
                    <td>${escapeHtml(video.subject)}</td>
                    <td><button class="delete-btn" onclick="deleteVideo(${videos.indexOf(video)})"><i class="fas fa-trash"></i> Delete</button></td>
                </tr>`;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        function filterTable() { renderTable(); }
        
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function showMessage(msg, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${msg}`;
            document.body.appendChild(msgDiv);
            setTimeout(() => msgDiv.remove(), 3000);
        }
        
        document.getElementById('videoInput').addEventListener('input', function() {
            const videoId = extractVideoId(this.value);
            const preview = document.getElementById('preview');
            const frame = document.getElementById('previewFrame');
            if (videoId) {
                frame.src = `https://www.youtube-nocookie.com/embed/${videoId}`;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
                frame.src = '';
            }
        });
        
        // Add download button
        const header = document.querySelector('.header');
        const downloadBtn = document.createElement('button');
        downloadBtn.className = 'btn btn-primary';
        downloadBtn.style.background = 'rgba(78,205,196,0.2)';
        downloadBtn.style.color = '#4ecdc4';
        downloadBtn.innerHTML = '<i class="fas fa-download"></i> Export links.txt';
        downloadBtn.onclick = downloadLinksTxt;
        header.appendChild(downloadBtn);
        
        loadVideos();
    </script>
</body>
</html>
