<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Zuhara Tuition Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #f0f4f8 0%, #e8edf2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.8);
            max-width: 400px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo i {
            font-size: 3rem;
            color: #2c7a6e;
            margin-bottom: 1rem;
        }

        h2 {
            color: #1e4a6b;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #5a7a94;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }

        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #1e4a6b;
            font-size: 0.85rem;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 0.9rem;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(100, 130, 120, 0.25);
            border-radius: 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #2c7a6e;
            box-shadow: 0 0 0 3px rgba(44, 122, 110, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .checkbox-group input {
            width: auto;
            margin: 0;
        }

        .checkbox-group label {
            color: #5a7a94;
            font-size: 0.8rem;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #2c7a6e, #1e5f55);
            border: none;
            border-radius: 1rem;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .error {
            color: #d9534f;
            margin-top: 1rem;
            font-size: 0.85rem;
            display: none;
        }

        .info {
            background: rgba(44, 122, 110, 0.1);
            padding: 0.8rem;
            border-radius: 0.8rem;
            margin-top: 1rem;
            font-size: 0.75rem;
            color: #2c7a6e;
        }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #5a7a94;
            text-decoration: none;
            font-size: 0.8rem;
        }

        .back-link:hover {
            color: #2c7a6e;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="logo"><i class="fas fa-chalkboard-teacher"></i></div>
        <h2>Student Portal</h2>
        <p class="subtitle">Enter your access code to view recorded classes</p>
        
        <div class="input-group">
            <label><i class="fas fa-key"></i> Access Code</label>
            <input type="password" id="accessCode" placeholder="Enter code provided by center" autofocus>
        </div>
        
        <div class="checkbox-group">
            <input type="checkbox" id="rememberMe">
            <label for="rememberMe">Remember me for 30 days (Students only)</label>
        </div>
        
        <button onclick="verifyAccess()">
            <i class="fas fa-unlock-alt"></i> Access Classes
        </button>
        
        <div class="error" id="errorMsg">
            <i class="fas fa-exclamation-circle"></i> Incorrect access code. Please contact Zuhara Tuition Center.
        </div>
        
        <div class="info">
            <i class="fas fa-info-circle"></i> Students: Use code provided by center | Admins: Use "zuhara@admin"
        </div>
        
        <a href="/index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>

    <script>
        // Student access code (change this to your desired student code)
        const STUDENT_PASSWORD = "zuhara2025";
        
        // Admin secret key
        const ADMIN_SECRET = "zuhara@admin";
        
        function setStudentCookie(rememberMe) {
            let expiryDate = new Date();
            if (rememberMe) {
                expiryDate.setDate(expiryDate.getDate() + 30);
            } else {
                expiryDate.setDate(expiryDate.getDate() + 1);
            }
            document.cookie = `zuhara_auth=authenticated; expires=${expiryDate.toUTCString()}; path=/; SameSite=Lax`;
        }
        
        function verifyAccess() {
            const enteredCode = document.getElementById('accessCode').value.trim();
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorDiv = document.getElementById('errorMsg');
            
            // Check for admin access - NO COOKIE, only sessionStorage
            if (enteredCode === ADMIN_SECRET) {
                // Admin uses ONLY sessionStorage (clears when tab closes)
                sessionStorage.setItem('adminAuthenticated', 'true');
                window.location.href = 'admin.html';
                return;
            }
            
            // Check for student access - uses cookie for persistence
            if (enteredCode === STUDENT_PASSWORD) {
                setStudentCookie(rememberMe);
                window.location.href = 'dashboard.html';
                return;
            }
            
            // Invalid access
            errorDiv.style.display = 'block';
            document.getElementById('accessCode').value = '';
            document.getElementById('accessCode').focus();
        }
        
        // Allow Enter key to submit
        document.getElementById('accessCode').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyAccess();
            }
        });
        
        // Check for existing admin session (sessionStorage only - NO COOKIE)
        if (sessionStorage.getItem('adminAuthenticated') === 'true') {
            window.location.href = 'admin.html';
        }
        
        // Check for existing student session (cookie only)
        const cookies = document.cookie.split(';');
        for (let cookie of cookies) {
            const [name, value] = cookie.trim().split('=');
            if (name === 'zuhara_auth' && value === 'authenticated') {
                window.location.href = 'dashboard.html';
                break;
            }
        }
    </script>
</body>
</html>
